                    return 6; // その他
                };

                // 同カテゴリ内では名前の長さ（具体性）で降順、次いで名前の昇順にソート
                this.player.inv.sort((a, b) => {
                    const pa = getSortPriority(a);
                    const pb = getSortPriority(b);
                    if (pa !== pb) return pa - pb;
                    // 同カテゴリ内: 装備中を先頭に、次いで名前順
                    if (a.isEquipped !== b.isEquipped) return a.isEquipped ? -1 : 1;
                    return a.name.localeCompare(b.name, 'ja');
                });
                UI.log('アイテムを整理した。');
            }

            // 拠点帰還時のプレイヤーの基本ステータスリセット処理
            resetPlayerStatsForBase() {
                this.player.lv = 1;
                this.player.exp = 0;
                this.player.maxHp = 15;
                this.player.hp = 15;
                this.player.str = 5;
                this.player.def = 5;
                this.player.food = 100;
                this.player.maxFood = 100;
                this.player.fullnessDuration = 0;
            }

            gameOver() {
                UI.log("全アイテムを失い、拠点に戻された……");
                // 所持品ロスト（倉庫以外）
                this.player.inv = [];
                this.player.equipAtk = null;
                this.player.equipDef = null;
                this.player.equipAbi = null;
                this.resetPlayerStatsForBase();

                // 死亡状態を即座にセーブに反映（全ロスを確定させる）
                this.saveGame();

                this.isAtBase = true;
                this.floor = 0;
                this.initFloor();
            }

            escapeToBase() {
                UI.log("不思議な力が働き、ダンジョンを脱出した！");
                this.resetPlayerStatsForBase();

                this.isAtBase = true;
                this.floor = 0;
                this.initFloor();
                this.draw();
            }

            // メニュー表示の更新
            openMenu() {
                const listDiv = document.getElementById('menu-list');
                listDiv.innerHTML = '';

                // 現在の装備スロット表示
                const slotDiv = document.createElement('div');
                slotDiv.style.cssText = 'padding:8px;margin-bottom:8px;background:#2a2a2a;border-radius:4px;font-size:12px;color:#ccc;';
                const atkName = this.player.equipAtk ? this.player.equipAtk.displayName : 'なし';
                const defName = this.player.equipDef ? this.player.equipDef.displayName : 'なし';
                const accName = this.player.equipAcc ? this.player.equipAcc.displayName : 'なし';
                slotDiv.innerHTML = `[攻撃] ${atkName} <br> [防御] ${defName} <br> [装飾] ${accName}`;
                listDiv.appendChild(slotDiv);


                if (this.player.inv.length === 0) {
                    const emptyDiv = document.createElement('div');
                    emptyDiv.innerText = '(アイテムがありません)';
                    listDiv.appendChild(emptyDiv);
                } else {
                    this.player.inv.forEach((item, index) => {
                        const div = document.createElement('div');
                        div.style.padding = "10px";
                        div.style.borderBottom = "1px solid #444";
                        div.style.display = "flex";
                        div.style.justifyContent = "space-between";
                        div.style.alignItems = "center";

                        // アイテム名と能力説明
                        const nameWrap = document.createElement('div');
                        const nameSpan = document.createElement('span');
                        nameSpan.innerText = item.displayName;
                        nameWrap.appendChild(nameSpan);
                        const abiSpan = document.createElement('div');
                        abiSpan.style.fontSize = '11px';
                        abiSpan.style.color = '#9fa8da';

                        let descText = '';
                        if (item.type.startsWith('disk_')) {
                            // 心（装備品）の場合は必ず基礎ステータスを表示
                            const val = item.value;
                            if (item.type === 'disk_atk') descText = `攻撃力 +${val}`;
                            else if (item.type === 'disk_def') descText = `防御力 +${val}`;
                            else if (item.type === 'disk_abi') descText = `魔力 +${val}`;

                            // 特殊能力があれば追記する
                            if (item.abilities && item.abilities.length > 0) {
                                descText += '  ★ ' + item.abilities.map(a => ABILITY_DESC[a] || a).join(' / ');
                            }
                        } else if (item.type === 'food') {
                            if (item.name === 'パンケーキ') descText = '満腹度が25%回復';
                            else if (item.name === '大きなパンケーキ') descText = '満腹度を50%回復';
                        } else if (item.type === 'potion') {
                            if (item.name === 'ラベンダーティー') descText = 'HPを60回復';
                        } else if (item.type === 'disk_exit' || item.type === 'comic_synth') {
                            descText = item.type === 'disk_exit' ? 'ダンジョンから脱出する' : 'アイテムを合成する';
                        }

                        if (descText) {
                            abiSpan.innerText = descText;
                            nameWrap.appendChild(abiSpan);
                        }
                        div.appendChild(nameWrap);

                        const btnGroup = document.createElement('div');

                        if (item.type === 'comic_synth') {
                            // 合成コミックスは「合成」ボタン
                            const btnSynth = document.createElement('button');
                            btnSynth.style.cssText = 'padding:5px 10px;background:#ff9800;color:#000;border:none;border-radius:4px;font-weight:bold;';
                            btnSynth.innerText = "合成";
                            btnSynth.onclick = () => this.useItem(index, 'use');
                            btnGroup.appendChild(btnSynth);
                        } else if (item.type === 'food') {
                            // 食料は「食べる」ボタン
                            const btnEat = document.createElement('button');
                            btnEat.style.padding = "5px 10px";
                            btnEat.innerText = "食べる";
                            btnEat.onclick = () => this.useItem(index, 'use');
                            btnGroup.appendChild(btnEat);
                        } else if (item.type === 'potion') {
                            // ラベンダーティーなどは「飲む」ボタン
                            const btnDrink = document.createElement('button');
                            btnDrink.style.padding = "5px 10px";
                            btnDrink.innerText = "飲む";
                            btnDrink.onclick = () => this.useItem(index, 'use');
                            btnGroup.appendChild(btnDrink);
                        } else if (item.type === 'disk_exit' || item.type === 'comic_synth') {
                            // 巻物は「読む」ボタン
                            const btnRead = document.createElement('button');
                            btnRead.style.padding = "5px 10px";
                            btnRead.innerText = "読む";
                            btnRead.onclick = () => this.useItem(index, 'use');
                            btnGroup.appendChild(btnRead);
                        } else {
                            // 装備/外すボタン
                            const btnOpt = document.createElement('button');
                            btnOpt.style.cssText = 'padding:5px 8px;margin-right:4px;';
                            btnOpt.innerText = item.isEquipped ? "外す" : "装備";
                            btnOpt.onclick = () => {
                                event.stopPropagation();
                                this.useItem(index, 'use');
                            };
                            btnGroup.appendChild(btnOpt);

                            // ディスク（心）なら「合成」ボタン（同じ装備が他にある場合、かつ巻物でない場合。装飾の心は除外）
                            if (item.type.startsWith('disk_') && !item.isEquipped && !['disk_exit', 'comic_synth', 'disk_acc'].includes(item.type)) {
                                const hasSame = this.player.inv.some((it, i) => i !== index && it.name === item.name);
                                if (hasSame) {
                                    const btnS = document.createElement('button');
                                    btnS.style.cssText = 'padding:5px 8px;background:#ff9800;color:#000;border:none;border-radius:4px;margin-right:4px;font-weight:bold;';
                                    btnS.innerText = "合成";
                                    btnS.onclick = () => {
                                        event.stopPropagation();
                                        this.startSynthesis(null, index); // comicIndex を null に
                                    };
                                    btnGroup.appendChild(btnS);
                                }
                            }
                        }

                        // 捨てるボタン（すべてのアイテム共通）
                        const btnDrop = document.createElement('button');
                        btnDrop.style.cssText = 'padding:5px 8px;background:#555;color:#fff;border:none;border-radius:4px;margin-left:4px;';
                        btnDrop.innerText = "捨てる";
                        btnDrop.onclick = () => this.useItem(index, 'drop');
                        btnGroup.appendChild(btnDrop);

                        div.appendChild(btnGroup);
                        listDiv.appendChild(div);
                    });
                }
                document.getElementById('menu-modal').classList.add('active');
            }

            useItem(index, actionType) {
                const item = this.player.inv[index];

                if (actionType === 'drop') {
                    // 足元に置ける場所を探す
                    let dropX = this.player.x;
                    let dropY = this.player.y;
                    if (this.items.some(i => i.x === dropX && i.y === dropY)) {
                        let found = false;
                        for (let dy = -1; dy <= 1 && !found; dy++) {
                            for (let dx = -1; dx <= 1 && !found; dx++) {
                                if (dx === 0 && dy === 0) continue;
                                const nx = dropX + dx, ny = dropY + dy;
                                if (this.map.isWalkable(nx, ny) && !this.items.some(i => i.x === nx && i.y === ny)) {
                                    dropX = nx; dropY = ny; found = true;
                                }
                            }
                        }
                        if (!found) {
                            UI.log("置くスペースがない！");
                            return;
                        }
                    }

                    if (item.isEquipped) {
                        item.isEquipped = false;
                        if (this.player.equipAtk === item) this.player.equipAtk = null;
                        if (this.player.equipDef === item) this.player.equipDef = null;
                        if (this.player.equipAcc === item) this.player.equipAcc = null;
                        if (this.player.equipAbi === item) this.player.equipAbi = null;
                    }
                    this.player.inv.splice(index, 1);
                    item.x = dropX;
                    item.y = dropY;
                    this.items.push(item);
                    // 拠点なら保存対象にする
                    if (this.isAtBase) this.baseItems = this.items;
                    UI.log(`${item.name} を置いた。`);

                    document.getElementById('menu-modal').classList.remove('active');
                    this.processTurn();
                    this.draw();
                    return;
                }

                if (actionType === 'invoke') {
                    if (item.invoke(this.player, this.map, this.enemies)) {
                        this.player.inv.splice(index, 1); // 消費
                        // 消費後に敵の死亡チェックを行う
                        this.enemies.forEach(e => this.checkEnemyDeath(e));
                    }
                } else {
                    // 通常の装備・使用
                    if (item.type === 'food') {
                        // 表記（Math.floor）が現在の最大満腹度（maxFood）に達していれば、最大値を上げる
                        // ターン経過による微減（0.1）を考慮して判定
                        if (Math.floor(this.player.food + 0.11) >= this.player.maxFood) {
                            if (item.name === '大きなパンケーキ') {
                                this.player.maxFood += 2;
                                this.player.food += 2;
                                UI.log(`お腹がいっぱいの時に${item.name}を食べた！ 最大満腹度が 2 上がった！`);
                            } else {
                                this.player.maxFood += 1;
                                this.player.food += 1;
                                UI.log(`お腹がいっぱいの時に${item.name}を食べた！ 最大満腹度が 1 上がった！`);
                            }
                        } else {
                            this.player.food = Math.min(this.player.maxFood, this.player.food + item.value);
                            UI.log(`${item.name} を食べた。満腹度が${item.value}%回復した。`);
                        }
                        // 腹持ち効果（3ターン）を追加
                        this.player.fullnessDuration = 3;
                        this.player.inv.splice(index, 1);
                    } else if (item.type === 'potion') {
                        if (this.player.hp >= this.player.maxHp) {
                            const boost = (item.name === '高級ラベンダーティー' && item.value === 999) ? 2 : 1;
                            this.player.maxHp += boost;
                            this.player.hp = this.player.maxHp;
                            UI.log(`HPが満タンの時に${item.name}を飲んだ！ 最大HPが ${boost} 上がった！`);
                        } else {
                            if (item.name === '高級ラベンダーティー' && item.value === 999) {
                                this.player.hp = this.player.maxHp;
                                UI.log(`${item.name} を飲んだ。HPが全回復した！`);
                            } else {
                                this.player.hp = Math.min(this.player.maxHp, this.player.hp + item.value);
                                UI.log(`${item.name} を飲んだ。HPが${item.value}回復した！`);
                            }
                        }
                        this.player.inv.splice(index, 1);
                    } else if (item.type === 'disk_atk') {
                        if (item.isEquipped) {
                            item.isEquipped = false;
                            this.player.equipAtk = null;
                            UI.log(`${item.name} を外した。`);
                        } else {
                            if (this.player.equipAtk) this.player.equipAtk.isEquipped = false;
                            item.isEquipped = true;
                            this.player.equipAtk = item;
                            UI.log(`${item.name} を攻撃スロットに装備した。`);
                        }
                    } else if (item.type === 'disk_def') {
                        if (item.isEquipped) {
                            item.isEquipped = false;
                            this.player.equipDef = null;
                            UI.log(`${item.name} を外した。`);
                        } else {
                            if (this.player.equipDef) this.player.equipDef.isEquipped = false;
                            item.isEquipped = true;
                            this.player.equipDef = item;
                            UI.log(`${item.name} を防御スロットに装備した。`);
                        }
                    } else if (item.type === 'disk_acc') {
                        if (item.isEquipped) {
                            item.isEquipped = false;
                            this.player.equipAcc = null;
                            UI.log(`${item.name} を外した。`);
                        } else {
                            if (this.player.equipAcc) this.player.equipAcc.isEquipped = false;
                            item.isEquipped = true;
                            this.player.equipAcc = item;
                            UI.log(`${item.name} をアクセサリー枠に装備した。`);
                        }
                    } else if (item.type === 'disk_exit') {
                        this.escapeToBase();
                        this.player.inv.splice(index, 1);
                        document.getElementById('menu-modal').classList.remove('active');
                        return; // 拠点でターン経過させないよう即終了
                    } else if (item.type === 'comic_synth') {
                        this.startSynthesis(index);
                        return; // メニューを閉じず、合成フローへ移行
                    }
                }

                // メニュー更新とターン経過
                this.openMenu();
                this.processTurn();
                this.draw();
            }

            // 合成システム
            startSynthesis(comicIndex, baseIdxOverride = -1) {
                this.synthState = {
                    step: (baseIdxOverride >= 0 ? 'material' : 'base'),
                    comicIndex: comicIndex,
                    baseIndex: baseIdxOverride
                };
                this.openSynthesisMenu();
            }

            openSynthesisMenu() {
                const listDiv = document.getElementById('menu-list');
                listDiv.innerHTML = '';

                const titleDiv = document.createElement('div');
                titleDiv.style.fontWeight = 'bold';
                titleDiv.style.marginBottom = '10px';
                titleDiv.style.color = '#ffeb3b';

                // ベースまたは素材として選べるディスクをリストアップ（巻物および装飾の心は除外）
                let disks = this.player.inv.map((it, idx) => ({ item: it, originalIndex: idx }))
                    .filter(o => o.item.type.startsWith('disk_') && !['disk_exit', 'comic_synth', 'disk_acc'].includes(o.item.type));

                const baseItem = this.synthState.baseIndex >= 0 ? this.player.inv[this.synthState.baseIndex] : null;

                if (this.synthState.step === 'base') {
                    titleDiv.innerText = '合成のベースにする装備を選んでください。';
                } else if (this.synthState.step === 'material') {
                    const materialTypeLabel = (this.synthState.comicIndex === null) ? `同種の「${baseItem.name}」` : (baseItem.type === 'disk_atk' ? "攻撃の心" : "防御の心");
                    titleDiv.innerText = `素材を選んでください。(${baseItem.name}に加算されます)\n対象: ${materialTypeLabel}`;

                    // ベースアイテムと同じ種類（攻撃or防御）に絞る
                    disks = disks.filter(o => o.item.type === baseItem.type && o.originalIndex !== this.synthState.baseIndex);

                    // 同種合成（コミックなし）の場合は、同じ名前のアイテムのみに絞る
                    if (this.synthState.comicIndex === null) {
                        disks = disks.filter(o => o.item.name === baseItem.name);
                    }
                } else if (this.synthState.step === 'select_abilities') {
                    titleDiv.innerText = `合成能力の選択 (${this.synthState.selectedAbilities.length}/2)\n残す特殊能力を2つ選んでください。`;
                }
                listDiv.appendChild(titleDiv);

                if (this.synthState.step === 'select_abilities') {
                    // 能力選択用のUIを描画
                    this.synthState.pendingAbilities.forEach(a => {
                        const div = document.createElement('div');
                        div.style.padding = "10px";
                        div.style.borderBottom = "1px solid #444";
                        div.style.display = "flex";
                        div.style.justifyContent = "space-between";

                        const nameSpan = document.createElement('span');
                        nameSpan.innerText = ABILITY_DESC[a] || a;
                        div.appendChild(nameSpan);

                        const isSelected = this.synthState.selectedAbilities.includes(a);
                        const btnToggle = document.createElement('button');
                        btnToggle.style.padding = "5px 10px";
                        btnToggle.innerText = isSelected ? "選択解除" : "選択";

                        // すでに2つ選ばれていて、自分が未選択の場合はグレーアウト
                        if (!isSelected && this.synthState.selectedAbilities.length >= 2) {
                            btnToggle.disabled = true;
                            btnToggle.style.opacity = 0.5;
                        }

                        btnToggle.onclick = () => {
                            if (isSelected) {
                                this.synthState.selectedAbilities = this.synthState.selectedAbilities.filter(sa => sa !== a);
                            } else {
                                if (this.synthState.selectedAbilities.length < 2) {
                                    this.synthState.selectedAbilities.push(a);
                                }
                            }
                            this.openSynthesisMenu();
                        };
                        div.appendChild(btnToggle);
                        listDiv.appendChild(div);
                    });

                    // 決定ボタン
                    const btnConfirm = document.createElement('button');
                    btnConfirm.innerText = "合成決定";
                    btnConfirm.style.marginTop = "10px";
                    btnConfirm.style.padding = "5px 10px";
                    btnConfirm.style.backgroundColor = this.synthState.selectedAbilities.length === 2 ? '#4CAF50' : '#888';
                    btnConfirm.style.color = '#fff';
                    btnConfirm.disabled = this.synthState.selectedAbilities.length !== 2;
                    btnConfirm.onclick = () => {
                        this.finalizeSynthesis(this.synthState.selectedAbilities);
                    };
                    listDiv.appendChild(btnConfirm);
                } else if (disks.length === 0 || (this.synthState.step === 'material' && disks.length === 0)) {
                    const noDiv = document.createElement('div');
                    noDiv.innerText = '合成できる対象がありません。';
                    listDiv.appendChild(noDiv);
                } else {
                    disks.forEach(eq => {
                        if (this.synthState.step === 'material' && eq.originalIndex === this.synthState.baseIndex) return;

                        const div = document.createElement('div');
                        div.style.padding = "10px";
                        div.style.borderBottom = "1px solid #444";
                        div.style.display = "flex";
                        div.style.justifyContent = "space-between";

                        const nameSpan = document.createElement('span');
                        nameSpan.innerText = eq.item.displayName;
                        div.appendChild(nameSpan);

                        const btnSelect = document.createElement('button');
                        btnSelect.style.padding = "5px 10px";
                        btnSelect.innerText = "選択";
                        btnSelect.onclick = () => {
                            if (this.synthState.step === 'base') {
                                this.synthState.baseIndex = eq.originalIndex;
                                this.synthState.step = 'material';
                                this.openSynthesisMenu();
                            } else {
                                this.executeSynthesis(eq.originalIndex);
                            }
                        };
                        div.appendChild(btnSelect);
                        listDiv.appendChild(div);
                    });
                }

                const btnCancel = document.createElement('button');
                btnCancel.innerText = "キャンセル";
                btnCancel.style.marginTop = "10px";
                btnCancel.style.padding = "5px 10px";
                btnCancel.onclick = () => {
                    this.synthState = null;
                    this.openMenu();
                };
                listDiv.appendChild(btnCancel);

                document.getElementById('menu-modal').classList.add('active');
            }

            executeSynthesis(materialIndex) {
                const baseItem = this.player.inv[this.synthState.baseIndex];
                const materialItem = this.player.inv[materialIndex];

                // 引き継ぐ可能性のある全能力をリストアップ
                let newAbilities = [...new Set([...(baseItem.abilities || []), ...(materialItem.abilities || [])])];

                if (newAbilities.length > 2) {
                    // 能力が3つ以上になる場合、選択フェーズへ移行
                    this.synthState.materialIndex = materialIndex;
                    this.synthState.step = 'select_abilities';
                    this.synthState.pendingAbilities = newAbilities;
                    this.synthState.selectedAbilities = []; // 選択中の能力リスト
                    this.openSynthesisMenu();
                } else {
                    // 2個以下ならそのまま全て確定
                    this.finalizeSynthesis(newAbilities, materialIndex);
                }
            }

            finalizeSynthesis(chosenAbilities, overrideMaterialIndex = null) {
                const materialIndex = overrideMaterialIndex !== null ? overrideMaterialIndex : this.synthState.materialIndex;
                const baseItem = this.player.inv[this.synthState.baseIndex];
                const materialItem = this.player.inv[materialIndex];
                const comicIndex = this.synthState.comicIndex;

                UI.log(`${baseItem.name} に ${materialItem.name} を合成した！`);

                // ＋値の計算と基本性能への加算
                // ベースの＋値 ＋ 素材の＋値 ＋ 1 (本体分)
                const boost = (materialItem.plus + 1);
                baseItem.value += boost;
                baseItem.plus += boost;

                // 能力の上書き継承
                baseItem.abilities = chosenAbilities;
                if (chosenAbilities.length > 0) {
                    const abiNames = chosenAbilities.map(a => ABILITY_DESC[a] || a).join(' / ');
                    UI.log(`能力「${abiNames}」を引き継いだ！`);
                }

                // 素材と（もしあれば）コミックスを消費
                const toRemove = [materialIndex];
                if (comicIndex !== null) toRemove.push(comicIndex);

                // インデックスがずれないよう、降順にソートして削除
                toRemove.sort((a, b) => b - a).forEach(idx => {
                    const removedItem = this.player.inv[idx];
                    if (this.player.equipAtk === removedItem) {
                        this.player.equipAtk = null;
                        removedItem.isEquipped = false;
                    }
                    if (this.player.equipDef === removedItem) {
                        this.player.equipDef = null;
                        removedItem.isEquipped = false;
                    }
                    this.player.inv.splice(idx, 1);
                });

                this.synthState = null;
                UI.log(`${baseItem.displayName} に強化された！`);
                this.openMenu();
                this.processTurn();
                this.draw();
            }

            // 敵の死亡判定と経験値獲得処理の共通化
            checkEnemyDeath(enemy) {
                if (enemy.hp <= 0 && enemy.hp !== -9999) {
                    // 創造主の第2形態移行チェック (経験値獲得前に行う)
                    if (enemy.baseType === '創造主' && enemy.phase === 1) {
                        enemy.hp = enemy.maxHp;
                        enemy.phase = 2;
                        enemy.isPhase2 = true;
                        UI.log("「創造主の身体がまばゆい光に包まれ、真の姿を現した……！」");
                        UI.log("「真の戦いはここからだ……！」");
                        return; // 死亡処理を中断（経験値も入らない）
                    }

                    let gainedExp = enemy.exp;
                    if (this.player.hasAbility('ultimate') || this.player.hasAbility('creator')) {
                        gainedExp *= 2;
                    }

                    UI.log(`${enemy.type}を倒し、${gainedExp} の経験値を得た！`);
                    this.player.exp = (this.player.exp || 0) + gainedExp;

                    // 覚醒ゲージ「敵撃破」で+20
                    if (this.player.awakenTurns === 0) {
                        this.player.awakenGauge = Math.min(this.player.awakenMax, this.player.awakenGauge + 20);
                        this.updateAwakenButton();
                    }

                    // レベルアップ処理
                    if (this.player.exp >= this.player.lv * 10) {
                        this.player.lv++;
                        this.player.maxHp += 5;
                        this.player.hp = this.player.maxHp;
                        this.player.str++;
                        this.player.def++;
                        this.player.exp = 0;
                        SoundManager.playLevelUp();
                        UI.log(`レベルアップ！ Lv${this.player.lv}になった！`);
                    }

                    enemy.hp = -9999; // 重複処理防止

                    // --- ドロップ処理 ---
                    const roll = Math.random();
                    let dropItem = null;

                    // 1. ボス・特殊敵の確定/高確率ドロップ
                    if (enemy.baseType === '巨大ハリネズミ') {
                        UI.log("巨大ハリネズミを倒した！ 足元に階段が現れた！");
                        this.map.data[this.player.y][this.player.x] = TILE.STAIRS;
                        dropItem = new Item(this.player.x, this.player.y, 'disk_def', '巨大ハリネズミの心', 10);
                        dropItem.abilities = ['reflect'];
                    } else if (enemy.baseType === 'アダマンタイト') {
                        UI.log("伝説の守護者アダマンタイトを撃破した！");
                        // ボスの中心位置（x+1, y+1）にドロップ
                        dropItem = new Item(enemy.x + 1, enemy.y + 1, 'disk_def', 'アダマンタイトの心', 99);
                        this.map.data[enemy.y + 1][enemy.x + 1] = TILE.STAIRS;
                    } else if (enemy.baseType === 'ダークもちにゃふぇ') {
                        this.handleDarkMotiDefeatEvent(enemy);
                    } else if (enemy.baseType === '創造主') {
                        this.handleCreatorDefeatEvent(enemy);
                    } else if (enemy.baseType === 'はぐれスライム' && roll < 0.10) {
                        dropItem = new Item(enemy.x, enemy.y, 'disk_def', 'はぐれスライムの心', 0);
                        dropItem.abilities = ['nullify_fire'];
                    } else if (enemy.baseType === 'メタルキング' && roll < 0.10) {
                        dropItem = new Item(enemy.x, enemy.y, 'disk_atk', 'メタルキングの心', 99);
                    } else if (enemy.baseType === '亡霊騎士' && roll < 0.10) {
                        dropItem = new Item(enemy.x, enemy.y, 'disk_def', '亡霊騎士の心', 0);
                        dropItem.abilities = ['phase_wall'];
                    } else if (roll < 0.30) {
                        // 2. 汎用ドロップ (30%)
                        // 敵固有の心
                        const baseName = enemy.baseType.replace(/^(ゴッド|極|シャドウ|強化)+/, '');
                        let type = 'disk_def';
                        let name = `${baseName}の心`;
                        let ability = null;
                        let baseValue = 3;
                        switch (baseName) {
                            case 'スライム':
                                type = 'disk_def';
                                ability = null;
                                break;
                            case 'ゴブリン':
                                type = 'disk_atk';
                                ability = 'atk_plus_5';
                                break;
                            case 'スケルトン':
                                type = 'disk_def';
                                ability = 'damage_reduce';
                                break;
                            case 'オーク':
                                type = 'disk_atk';
                                ability = 'multi_attack';
                                break;
                            case 'ワーウルフ':
                                type = 'disk_atk';
                                ability = 'wall_attack';
                                break;
                            case 'ゴーレム':
                                type = 'disk_def';
                                ability = 'slow_hunger';
                                break;
                            case 'ドラゴン':
                                type = 'disk_atk';
                                ability = 'pierce_2';
                                break;
                            case 'はぐれスライム':
                                type = 'disk_def';
                                ability = 'nullify_fire';
                                baseValue = 0;
                                break;
                            case 'メタルキング':
                                type = 'disk_atk';
                                ability = null; // 特殊能力なし
                                baseValue = 99;
                                break;
                            case '亡霊騎士':
                                type = 'disk_def';
                                ability = 'phase_wall';
                                baseValue = 0;
                                break;
                            default:
                                type = 'disk_def';
                                break;
                        }

                        dropItem = new Item(enemy.x, enemy.y, type, name, baseValue);
                        if (ability) dropItem.abilities = [ability];
                    }

                    if (dropItem) {
                        this.items.push(dropItem);
                        UI.log(`${dropItem.name}が落ちている！`);
                    }
                }
            }

            handleCreatorDefeatEvent(enemy) {
                const hasHeart = this.player.hasAbility('creator');

                const script = [
                    { name: '創造主', text: 'ぐは、貴様は何を求めるのだ？', icon: 'Assets/godmoti.png' },
                    { name: 'もちにゃふぇ', text: '僕はただ、にゃんるなちゃん達と楽しく暮らしたいだけだ！！', icon: 'Assets/moti.png' },
                    { name: '創造主', text: 'くそーーー！！', icon: 'Assets/godmoti.png' },
                    { name: 'もちにゃふぇ', text: 'ふーー、終わった…', icon: 'Assets/moti.png' },
                    { name: 'ナレーション', text: '不思議な光がもちにゃふぇを包む', icon: 'Assets/moti.png' },
                    { name: 'もちにゃふぇ', text: 'ふぇ〜〜', icon: 'Assets/moti.png' },
                    { name: 'にゃんるな', text: 'もちにゃふぇ、今日も癒しだねぇ', icon: 'Assets/runa.png' },
                    { name: 'もちにゃふぇ', text: 'きゅーーー、ふぇぇ〜〜', icon: 'Assets/moti.png' }
                ];

                UI.showConversation(script, () => {
                    if (hasHeart) {
                        // エンドレスモード：階段を生成
                        this.map.data[this.player.y][this.player.x] = TILE.STAIRS;
                        UI.log("創造主の力を取り込んだ「心」が共鳴し、地下深くへと続く階段が現れた……！");
                        UI.log("エンドレスモードが解禁された！！");
                    } else {
                        // 初回クリア：真エンディング
                        const endOverlay = document.getElementById('true-end-overlay');
                        endOverlay.classList.add('active');

                        setTimeout(() => {
                            endOverlay.classList.remove('active');

                            // 報酬：創造主の心 (直接入手)
                            const heart = new Item(this.player.x, this.player.y, 'disk_acc', '創造主の心', 0);
                            heart.abilities = ['creator'];
                            this.player.inv.push(heart);
                            UI.log("「創造主の心」を手に入れた！ 全ステータス2倍・満腹度減少無効の加護が与えられた。");

                            localStorage.setItem('diabolo_creator_defeated', 'true');

                            // 拠点へ帰還
                            this.escapeToBase();
                        }, 5000);
                    }
                });
            }

            handleDarkMotiDefeatEvent(enemy) {
                // 所持（インベントリ）または装備しているかチェック
                const hasHeart = this.player.hasAbility('ultimate') ||
                    this.player.inv.some(item => item.name === 'ダークもちにゃふぇの心');

                if (hasHeart) {
                    // 心をすでに持っている場合：エンドレスモードへ（階段と心をドロップ）
                    this.map.data[enemy.y][enemy.x] = TILE.STAIRS;
                    const heart = new Item(enemy.x, enemy.y, 'disk_acc', 'ダークもちにゃふぇの心', 0);
                    heart.abilities = ['ultimate'];
                    this.items.push(heart);

                    UI.log("ダークもちにゃふぇを再び退けた！");
                    UI.log("「ダークもちにゃふぇの心」が落ちている。");
                    UI.log("地下深くへと続く階段が現れた！");
                    return;
                }

                const script = [
                    { name: 'ダークもちにゃふぇ', text: 'そんなーー、俺としたことが、こんなふにゃふにゃのやつに負けるだとーーー！！！', icon: 'Assets/darkmoti.png' },
                    { name: 'もちにゃふぇ', text: '僕には、にゃんるなちゃんやツキネコちゃんが、大切なんだ！にゃんるなちゃん達がいる世界を、闇に染めるわけにはいかない！！', icon: 'Assets/moti.png' },
                    { name: 'ダークもちにゃふぇ', text: 'それが、お前の強さなんだな、完敗だ…', icon: 'Assets/darkmoti.png' },
                    { name: 'もちにゃふぇ', text: 'さすがに疲れたな…戻って、休むよ', icon: 'Assets/moti.png' }
                ];

                UI.showConversation(script, () => {
                    const clearOverlay = document.getElementById('clear-overlay');
                    clearOverlay.classList.add('active');

                    setTimeout(() => {
                        clearOverlay.classList.remove('active');

                        // 報酬：ダークもちにゃふぇの心
                        const heart = new Item(this.player.x, this.player.y, 'disk_acc', 'ダークもちにゃふぇの心', 0);
                        heart.abilities = ['ultimate'];
                        this.player.inv.push(heart);
                        UI.log("「ダークもちにゃふぇの心」を手に入れた！");

                        localStorage.setItem('diabolo_darkmoti_defeated', 'true');

                        // 拠点へ帰還
                        this.escapeToBase();
                    }, 5000);
                });
            }

            setupInput() {
                // PCキーボード操作 (矢印キー & テンキー)
                window.addEventListener('keydown', (e) => {
                    if (this.isConversationActive()) return;
                    let mx = 0, my = 0;
                    switch (e.key) {
                        case 'ArrowUp': case '8': my = -1; break;
                        case 'ArrowDown': case '2': my = 1; break;
                        case 'ArrowLeft': case '4': mx = -1; break;
                        case 'ArrowRight': case '6': mx = 1; break;
                        case '7': case 'Home': mx = -1; my = -1; break;
                        case '9': case 'PageUp': mx = 1; my = -1; break;
                        case '1': case 'End': mx = -1; my = 1; break;
                        case '3': case 'PageDown': mx = 1; my = 1; break;
                    }
                    if (mx !== 0 || my !== 0) {
                        e.preventDefault();
                        this.actionMove(mx, my);
                    }
                });

                // スワイプ操作（キャンバス上の8方向移動・長押しで連続移動）
                const canvasContainer = document.getElementById('canvas-container');
                let swipeTouchStartX = 0;
                let swipeTouchStartY = 0;
                let swipeMoveX = 0;       // 現在押下中の移動方向
                let swipeMoveY = 0;
                let swipeInterval = null; // 連続移動タイマー
                let swipeTimeout = null;  // 初動ディレイ用タイマー
                const SWIPE_THRESHOLD = 18;      // 最初の判定距離（px）
                const SWIPE_INITIAL_DELAY = 350; // 1歩目と2歩目の間の待機時間（ms）
                const SWIPE_REPEAT_MS = 150;     // 連続移動の速度（ms）

                // 角度から8方向(mx,my)を計算するヘルパー
                const angleToDir = (dx, dy) => {
                    const angle = Math.atan2(dy, dx);
                    const PI = Math.PI;
                    let mx = 0, my = 0;
                    if      (angle >  -PI/8  && angle <=  PI/8)  { mx =  1; my =  0; }
                    else if (angle >   PI/8  && angle <= 3*PI/8) { mx =  1; my =  1; }
                    else if (angle > 3*PI/8  && angle <= 5*PI/8) { mx =  0; my =  1; }
                    else if (angle > 5*PI/8  && angle <= 7*PI/8) { mx = -1; my =  1; }
                    else if (angle > 7*PI/8  || angle <= -7*PI/8){ mx = -1; my =  0; }
                    else if (angle > -7*PI/8 && angle <= -5*PI/8){ mx = -1; my = -1; }
                    else if (angle > -5*PI/8 && angle <= -3*PI/8){ mx =  0; my = -1; }
                    else if (angle > -3*PI/8 && angle <= -PI/8)  { mx =  1; my = -1; }
                    return { mx, my };
                };

                // 連続移動を止めるヘルパー
                const stopSwipeRepeat = () => {
                    if (swipeTimeout !== null) {
                        clearTimeout(swipeTimeout);
                        swipeTimeout = null;
                    }
                    if (swipeInterval !== null) {
                        clearInterval(swipeInterval);
                        swipeInterval = null;
                    }
                    swipeMoveX = 0;
                    swipeMoveY = 0;
                };

                canvasContainer.addEventListener('touchstart', (e) => {
                    if (this.isConversationActive()) return;
                    stopSwipeRepeat();
                    swipeTouchStartX = e.touches[0].clientX;
                    swipeTouchStartY = e.touches[0].clientY;
                }, { passive: true });

                canvasContainer.addEventListener('touchmove', (e) => {
                    if (this.isConversationActive()) return;
                    const dx = e.touches[0].clientX - swipeTouchStartX;
                    const dy = e.touches[0].clientY - swipeTouchStartY;
                    const absDx = Math.abs(dx);
                    const absDy = Math.abs(dy);

                    // 閾値を超えたら移動判定
                    if (absDx < SWIPE_THRESHOLD && absDy < SWIPE_THRESHOLD) return;

                    const { mx, my } = angleToDir(dx, dy);

                    // 方向が変わった時に移動ループを再スタート
                    if (mx !== swipeMoveX || my !== swipeMoveY) {
                        stopSwipeRepeat();
                        swipeMoveX = mx;
                        swipeMoveY = my;

                        // 【1歩目】即座に移動
                        SoundManager.playUI();
                        this.actionMove(mx, my);

                        // 【初動ディレイ】一定時間待ってから連続移動を開始
                        swipeTimeout = setTimeout(() => {
                            if (this.isConversationActive()) return;
                            
                            // 【2歩目以降】リピート移動開始
                            swipeInterval = setInterval(() => {
                                if (this.isConversationActive()) { stopSwipeRepeat(); return; }
                                SoundManager.playUI();
                                this.actionMove(swipeMoveX, swipeMoveY);
                            }, SWIPE_REPEAT_MS);
                        }, SWIPE_INITIAL_DELAY);
                    }
                }, { passive: true });

                canvasContainer.addEventListener('touchend', () => {
                    // 指を離したら連続移動を停止
                    stopSwipeRepeat();
                }, { passive: true });

                canvasContainer.addEventListener('touchcancel', () => {
                    stopSwipeRepeat();
                }, { passive: true });

                // アクションボタン
                document.getElementById('btn-stay').addEventListener('click', () => {
                    if (this.isConversationActive()) return;
                    SoundManager.playUI();
                    this.openSaveLoadMenu();
                });
                document.getElementById('btn-action').addEventListener('click', () => {
                    if (this.isConversationActive()) return;
                    if (this.player.awakenTurns > 0) {
                        SoundManager.playUI();
                        UI.log('覚醒中です！（残り ' + this.player.awakenTurns + ' ターン）');
                        return;
                    }
                    if (this.player.awakenGauge >= this.player.awakenMax) {
                        SoundManager.playLevelUp(); // 覚醒のダイナミックな音
                        this.player.awakenGauge = 0;
                        this.player.awakenTurns = 10;
                        this.updateAwakenButton();
                        UI.log('※　覚醒した！攻撃・防御が2倍になり、2回行動できる！10ターン。　※');
                        this.draw();
                    } else {
                        this.actionInteract();
                    }
                });
                document.getElementById('btn-attack').addEventListener('click', () => {
                    if (this.isConversationActive()) return;
                    const tile = this.map.getTile(this.player.x, this.player.y);
                    if (tile === TILE.STORAGE) {
                        SoundManager.playUI();
                        this.openStorageMenu();
                        return;
                    }
                    SoundManager.playAttack();
                    const dir = this.player.direction || 'down';
                    let dx = 0, dy = 0;
                    if (dir === 'right') dx = 1;
                    else if (dir === 'left') dx = -1;
                    else if (dir === 'down') dy = 1;
                    else if (dir === 'up') dy = -1;
                    else if (dir === 'up-left') { dx = -1; dy = -1; }
                    else if (dir === 'up-right') { dx = 1; dy = -1; }
                    else if (dir === 'down-left') { dx = -1; dy = 1; }
                    else if (dir === 'down-right') { dx = 1; dy = 1; }

                    if (this.player.hasAbility('pierce_2')) {
                        UI.log("もちにゃふぇは炎を吐いた！");
                        this.player.isAttacking = true;
                        this.player.isFiring = true;
                        this.draw();
                        for (let i = 1; i <= 2; i++) {
                            const tx = this.player.x + dx * i;
                            const ty = this.player.y + dy * i;
                            const target = this.enemies.find(e => {
                                if (e.hp <= 0) return false;
                                if (e.x === tx && e.y === ty) return true;
                                const eDef = ENEMY_DEFS[e.type];
                                if (eDef && eDef.size) {
                                    return tx >= e.x && tx < e.x + eDef.size && ty >= e.y && ty < e.y + eDef.size;
                                }
                                return false;
                            });
                            if (target) {
                                let totalStr = this.player.str;
                                if (this.player.equipAtk) totalStr += this.player.equipAtk.value;
                                if (this.player.awakenTurns > 0) totalStr *= 2;
                                if (this.player.hasAbility('atk_plus_5')) totalStr += 5;
                                const eDefData = ENEMY_DEFS[target.type];
                                const eDefVal = eDefData ? eDefData.def : 0;
                                let damage = Math.max(1, totalStr - Math.floor(eDefVal / 2));
                                target.hp -= damage;
                                UI.log(`炎が突き抜ける！ ${target.type} に ${damage} のダメージ！`);
                                this.checkEnemyDeath(target);
                            }
                        }
                        setTimeout(() => {
                            this.player.isAttacking = false;
                            this.player.isFiring = false;
                            if (this.player.awakenTurns > 0 && !this.player._awakenActed) {
                                this.player._awakenActed = true;
                                this.draw();
                            } else {
                                this.player._awakenActed = false;
                                this.processTurn();
                                this.draw();
                            }
                        }, 300);
                    } else {
                        let attacked = false;
                        for (let tdy = -1; tdy <= 1; tdy++) {
                            for (let tdx = -1; tdx <= 1; tdx++) {
                                if (tdx === 0 && tdy === 0) continue;
                                const nx = this.player.x + tdx;
                                const ny = this.player.y + tdy;
                                const target = this.enemies.find(e => {
                                    if (e.hp <= 0) return false;
                                    const eDef = ENEMY_DEFS[e.type];
                                    if (eDef && eDef.size) {
                                        return nx >= e.x && nx < e.x + eDef.size && ny >= e.y && ny < e.y + eDef.size;
                                    }
                                    return e.x === nx && e.y === ny;
                                });
                                if (target) {
                                    this.actionMove(tdx, tdy);
                                    attacked = true;
                                    break;
                                }
                            }
                            if (attacked) break;
                        }
                        if (!attacked) {
                            UI.log("空振り！");
                            if (this.player.awakenTurns > 0 && !this.player._awakenActed) {
                                this.player._awakenActed = true;
                                this.draw();
                            } else {
                                this.player._awakenActed = false;
                                this.processTurn();
                                this.draw();
                            }
                        }
                    }
                });

                // 方向ボタン操作（画面上の方向キー）
                document.querySelectorAll('.btn-pad[data-dir]').forEach(btn => {
                    btn.addEventListener('click', () => {
                        SoundManager.playUI();
                        const dir = btn.getAttribute('data-dir');
                        let mx = 0, my = 0;
                        switch (dir) {
                            case '1': mx = -1; my = 1; break;
                            case '2': mx = 0; my = 1; break;
                            case '3': mx = 1; my = 1; break;
                            case '4': mx = -1; my = 0; break;
                            case '6': mx = 1; my = 0; break;
                            case '7': mx = -1; my = -1; break;
                            case '8': mx = 0; my = -1; break;
                            case '9': mx = 1; my = -1; break;
                        }
                        if (mx !== 0 || my !== 0) {
                            this.actionMove(mx, my);
                        }
                    });
                });

                document.getElementById('btn-saveload-close').addEventListener('click', () => {
                    document.getElementById('saveload-modal').classList.remove('active');
                });

                document.getElementById('btn-menu').addEventListener('click', () => {
                    if (this.isConversationActive()) return;
                    this.synthState = null;
                    this.openMenu();
                });

                document.getElementById('btn-dir-change').addEventListener('click', () => {
                    if (this.isConversationActive()) return;
                    // 方向パッドの表示/非表示を切り替え
                    const dirPad = document.getElementById('dir-pad');
                    const isVisible = !dirPad.classList.contains('collapsed');
                    if (isVisible) {
                        dirPad.classList.add('collapsed');
                    } else {
                        dirPad.classList.remove('collapsed');
                    }
                });

                // 方向パッド中央「向」ボタン：向きモード切り替え
                document.getElementById('btn-dir-pad-center').addEventListener('click', () => {
                    if (this.isConversationActive()) return;
                    this.isDirectionMode = !this.isDirectionMode;
                    const btn = document.getElementById('btn-dir-pad-center');
                    if (this.isDirectionMode) {
                        btn.style.background = '#ffeb3b';
                        btn.style.color = '#000';
                        UI.log('向きモードON：移動キーで向きだけを変えます。');
                    } else {
                        btn.style.background = '';
                        btn.style.color = '';
                        UI.log('向きモードOFF：通常移動に戻りました。');
                    }
                });
                document.getElementById('btn-menu-sort').addEventListener('click', () => {
                    this.sortInventory();
                    this.openMenu();
                });
                document.getElementById('btn-menu-close').addEventListener('click', () => {
                    document.getElementById('menu-modal').classList.remove('active');
                    this.synthState = null;
                });
            }

            draw() {
                const cx = Math.max(0, Math.min(this.player.x * TILE_SIZE - this.canvas.width / 2, this.map.width * TILE_SIZE - this.canvas.width));
                const cy = Math.max(0, Math.min(this.player.y * TILE_SIZE - this.canvas.height / 2, this.map.height * TILE_SIZE - this.canvas.height));
                this.camera = { x: cx, y: cy };
                this.offsetX = -cx;
                this.offsetY = -cy;

                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

                const startCol = Math.floor(cx / TILE_SIZE);
                const endCol = startCol + Math.ceil(this.canvas.width / TILE_SIZE);
                const startRow = Math.floor(cy / TILE_SIZE);
                const endRow = startRow + Math.ceil(this.canvas.height / TILE_SIZE);

                // 階層に基づいた壁と床のテクスチャを選択
                let current_tile_wall, current_tile_floor;
                if (this.isAtBase || this.floor === 0) {
                    current_tile_wall = PixelArtEngine.textures.tile_wall_1_10;
                    current_tile_floor = PixelArtEngine.textures.tile_floor_1_10;
                } else if (this.floor >= 1 && this.floor <= 10) {
                    current_tile_wall = PixelArtEngine.textures.tile_wall_1_10;
                    current_tile_floor = PixelArtEngine.textures.tile_floor_1_10;
                } else if (this.floor >= 11 && this.floor <= 20) {
                    current_tile_wall = PixelArtEngine.textures.tile_wall_11_20;
                    current_tile_floor = PixelArtEngine.textures.tile_floor_11_20;
                } else if (this.floor >= 21 && this.floor <= 40) {
                    current_tile_wall = PixelArtEngine.textures.tile_wall_21_40;
                    current_tile_floor = PixelArtEngine.textures.tile_floor_21_40;
                } else {
                    current_tile_wall = PixelArtEngine.textures.tile_wall_41;
                    current_tile_floor = PixelArtEngine.textures.tile_floor_41;
                }

                for (let y = startRow; y <= endRow; y++) {
                    for (let x = startCol; x <= endCol; x++) {
                        if (x < 0 || x >= this.map.width || y < 0 || y >= this.map.height) continue;
                        const px = x * TILE_SIZE - cx;
                        const py = y * TILE_SIZE - cy;
                        const tile = this.map.data[y][x];
                        if (tile === TILE.WALL || tile === TILE.OUT_BOUNDARY) {
                            this.ctx.drawImage(current_tile_wall, px, py);
                        } else {
                            this.ctx.drawImage(current_tile_floor, px, py);
                            if (tile === TILE.STAIRS) this.ctx.drawImage(PixelArtEngine.textures.tile_stairs, px, py);
                            else if (tile === TILE.STORAGE) this.ctx.drawImage(PixelArtEngine.textures.tile_storage, px, py);
                            else if (tile === TILE.BASE_EXIT) this.ctx.drawImage(PixelArtEngine.textures.tile_base_exit, px, py);
                        }
                    }
                }

                this.items.forEach(item => {
                    const px = item.x * TILE_SIZE - cx;
                    const py = item.y * TILE_SIZE - cy;
                    if (px >= -TILE_SIZE && px <= this.canvas.width && py >= -TILE_SIZE && py <= this.canvas.height) {
                        let tex;
                        if (item.type === 'food') tex = PixelArtEngine.externalTextures.item_food_img || PixelArtEngine.textures.item_food;
                        else if (item.type === 'potion') tex = PixelArtEngine.externalTextures.item_potion_img || PixelArtEngine.textures.item_potion;
                        else if (item.type === 'disk_atk') tex = PixelArtEngine.textures.item_heart_atk;
                        else if (item.type === 'disk_def') tex = PixelArtEngine.textures.item_heart_def;
                        else if (item.type === 'disk_exit' || item.type === 'comic_synth') tex = PixelArtEngine.externalTextures.item_scroll_img || PixelArtEngine.textures.item_scroll;
                        else tex = PixelArtEngine.textures.item_disk;
                        if (tex) this.ctx.drawImage(tex, px, py, TILE_SIZE, TILE_SIZE);
                    }
                });

                this.enemies.forEach(enemy => {
                    if (enemy.hp > 0) {
                        const px = enemy.x * TILE_SIZE - cx;
                        const py = enemy.y * TILE_SIZE - cy;
                        const eDef = ENEMY_DEFS[enemy.type];
                        const eSize = (eDef && eDef.size) ? eDef.size : 1;
                        const drawW = TILE_SIZE * eSize;
                        const drawH = TILE_SIZE * eSize;
                        if (px >= -drawW && px <= this.canvas.width && py >= -drawH && py <= this.canvas.height) {
                            const tex = PixelArtEngine.textures[enemy.spriteName] || PixelArtEngine.textures.enemy_slime;
                            if (enemy.type === 'ダークもちにゃふぇ' && PixelArtEngine.externalTextures.enemy_dark_moti_img) {
                                const darkMotiImg = PixelArtEngine.externalTextures.enemy_dark_moti_img;
                                this.ctx.drawImage(darkMotiImg.complete ? darkMotiImg : tex, px, py, drawW, drawH);
                            } else if (enemy.baseType === '創造主' && PixelArtEngine.externalTextures.enemy_creator_img) {
                                const creatorImg = PixelArtEngine.externalTextures.enemy_creator_img;
                                if (creatorImg.complete) {
                                    if (enemy.isPhase2) {
                                        this.ctx.save();
                                        this.ctx.filter = "brightness(1.2) drop-shadow(0 0 15px gold)";
                                        this.ctx.drawImage(creatorImg, px, py, drawW, drawH);
                                        this.ctx.restore();
                                    } else {
                                        this.ctx.drawImage(creatorImg, px, py, drawW, drawH);
                                    }
                                } else {
                                    this.ctx.drawImage(tex, px, py, drawW, drawH);
                                }
                            } else if (enemy.type === 'アダマンタイト' && enemy.hp < enemy.maxHp * 0.5) {
                                this.ctx.save();
                                this.ctx.filter = 'drop-shadow(0 0 5px red) sepia(100%) saturate(1000%) hue-rotate(320deg)';
                                this.ctx.drawImage(tex, px, py, drawW, drawH);
                                this.ctx.restore();
                            } else {
                                this.ctx.drawImage(tex, px, py, drawW, drawH);
                            }

                            if (enemy.activeEffect) {
                                this.ctx.save();
                                if (enemy.activeEffect === 'genesis' && PixelArtEngine.textures.fx_genesis) {
                                    const beamTex = PixelArtEngine.textures.fx_genesis;
                                    this.ctx.globalAlpha = 0.7;
                                    for (let i = -10; i <= 10; i++) {
                                        this.ctx.drawImage(beamTex, px + enemy.fireDir.x * i * TILE_SIZE, py + enemy.fireDir.y * i * TILE_SIZE, drawW, drawH);
                                    }
                                } else if (enemy.activeEffect === 'holy_pulse' && PixelArtEngine.textures.fx_holy_pulse) {
                                    const ex = (enemy.effectX - this.player.x + 6) * TILE_SIZE + this.offsetX;
                                    const ey = (enemy.effectY - this.player.y + 6) * TILE_SIZE + this.offsetY;
                                    this.ctx.drawImage(PixelArtEngine.textures.fx_holy_pulse, ex - TILE_SIZE, ey - TILE_SIZE, TILE_SIZE * 3, TILE_SIZE * 3);
                                } else if (enemy.activeEffect === 'apocalypt' && PixelArtEngine.textures.fx_apocalypt) {
                                    this.ctx.globalAlpha = 0.8;
                                    this.ctx.drawImage(PixelArtEngine.textures.fx_apocalypt, px - TILE_SIZE * 6, py - TILE_SIZE * 6, drawW + TILE_SIZE * 12, drawH + TILE_SIZE * 12);
                                }
                                this.ctx.restore();
                            }

                            const hpRatio = enemy.hp / enemy.maxHp;
                            this.ctx.fillStyle = 'red';
                            this.ctx.fillRect(px, py - 7, drawW, 5);
                            this.ctx.fillStyle = 'lime';
                            this.ctx.fillRect(px, py - 7, drawW * Math.max(0, hpRatio), 5);

                            if (enemy.isFiring && PixelArtEngine.textures.fx_fire) {
                                if (enemy.type === 'ダークもちにゃふぇ' && enemy.fireDir.x === 0 && enemy.fireDir.y === 0) {
                                    for (let fdy = -2; fdy <= 3; fdy++) {
                                        for (let fdx = -2; fdx <= 3; fdx++) {
                                            if (fdx < 0 || fdx > 1 || fdy < 0 || fdy > 1) {
                                                this.ctx.drawImage(PixelArtEngine.textures.fx_fire, px + fdx * TILE_SIZE, py + fdy * TILE_SIZE);
                                            }
                                        }
                                    }
                                } else {
                                    for (let i = 1; i <= enemy.fireDist; i++) {
                                        this.ctx.drawImage(PixelArtEngine.textures.fx_fire, px + enemy.fireDir.x * i * TILE_SIZE, py + enemy.fireDir.y * i * TILE_SIZE);
                                    }
                                }
                            }
                            if (enemy.isRoaring) this.ctx.drawImage(PixelArtEngine.textures.fx_roar, px - TILE_SIZE, py - TILE_SIZE, drawW + TILE_SIZE * 2, drawH + TILE_SIZE * 2);
                            if (enemy.isTremoring) {
                                for (let ty = -1; ty <= 1; ty++) for (let tx = -1; tx <= 1; tx++)
                                    this.ctx.drawImage(PixelArtEngine.textures.fx_tremor, px + tx * TILE_SIZE + TILE_SIZE, py + ty * TILE_SIZE + TILE_SIZE);
                            }
                            if (enemy.isPrickly) {
                                for (let ty = -1; ty <= 3; ty++) for (let tx = -1; tx <= 3; tx++)
                                    if (tx === -1 || tx === 3 || ty === -1 || ty === 3)
                                        this.ctx.drawImage(PixelArtEngine.textures.fx_spike, px + tx * TILE_SIZE, py + ty * TILE_SIZE);
                            }
                        }
                    }
                });

                const px = this.player.x * TILE_SIZE - cx;
                const py = this.player.y * TILE_SIZE - cy;
                const dir = this.player.direction || 'down';
                const atk = this.player.isAttacking;

                if (this.player.isFiring && PixelArtEngine.textures.fx_fire) {
                    let fdx = 0, fdy = 0;
                    if (dir === 'up') fdy = -1; else if (dir === 'down') fdy = 1; else if (dir === 'left') fdx = -1; else if (dir === 'right') fdx = 1;
                    else if (dir === 'up-left') { fdx = -1; fdy = -1; } else if (dir === 'up-right') { fdx = 1; fdy = -1; }
                    else if (dir === 'down-left') { fdx = -1; fdy = 1; } else if (dir === 'down-right') { fdx = 1; fdy = 1; }
                    for (let i = 1; i <= 2; i++) this.ctx.drawImage(PixelArtEngine.textures.fx_fire, px + fdx * i * TILE_SIZE, py + fdy * i * TILE_SIZE);
                }

                if (PixelArtEngine.mochinyafeImg && PixelArtEngine.mochinyafeImg.complete) {
                    let sprite;
                    if (atk) {
                        sprite = PLAYER_SPRITE_CONFIG.attack[dir] || PLAYER_SPRITE_CONFIG.attack['down'];
                    } else {
                        const frames = PLAYER_SPRITE_CONFIG[dir] || PLAYER_SPRITE_CONFIG['down'];
                        sprite = frames[this.player.walkFrame % frames.length];
                    }

                    if (sprite) {
                        // タイルサイズ（TILE_SIZE = 32）に収まるようにスケーリング
                        const targetSize = TILE_SIZE;
                        const scale = Math.min(targetSize / sprite.sw, targetSize / sprite.sh);
                        const drawW = sprite.sw * scale;
                        const drawH = sprite.sh * scale;
                        // タイルの中央に配置
                        const offX = (targetSize - drawW) / 2;
                        const offY = (targetSize - drawH) / 2;

                        this.ctx.drawImage(
                            PixelArtEngine.mochinyafeImg,
                            sprite.sx, sprite.sy, sprite.sw, sprite.sh,
                            px + offX, py + offY, drawW, drawH
                        );
                    }
                } else {
                    const playerTex = PixelArtEngine.textures[atk ? `player_atk_${dir}` : (dir === 'down' ? 'player' : `player_${dir}`)] || PixelArtEngine.textures.player;
                    this.ctx.drawImage(playerTex, px, py);
                }
            }

            saveGame() {
                if (this.player.hp <= 0 && !this.isAtBase) { localStorage.removeItem('diabolo_roguelike_save'); return; }
                localStorage.setItem('diabolo_roguelike_save', JSON.stringify({
                    floor: this.floor, isAtBase: this.isAtBase, player: this.player,
                    mapData: this.map.data, mapRooms: this.map.rooms, enemies: this.enemies,
                    items: this.items, baseItems: this.baseItems, storage: this.storage
                }));
            }

            loadGame() {
                const saveData = localStorage.getItem('diabolo_roguelike_save');
                if (!saveData) return false;
                try {
                    const obj = JSON.parse(saveData);
                    this.floor = obj.floor; this.isAtBase = obj.isAtBase || false;
                    this.baseItems = obj.baseItems || []; this.storage = obj.storage || [];
                    const p = obj.player;
                    this.player.lv = p.lv; this.player.hp = p.hp; this.player.maxHp = p.maxHp;
                    this.player.str = p.str; this.player.def = p.def; this.player.food = p.food;
                    this.player.maxFood = p.maxFood; this.player.direction = p.direction;
                    this.player.fullnessDuration = p.fullnessDuration || 0;
                    this.player.awakenGauge = p.awakenGauge || 0; this.player.awakenTurns = p.awakenTurns || 0;
                    this.player.isDirectionMode = p.isDirectionMode || false;
                    const reconstruct = list => (list || []).map(i => {
                        const it = new Item(i.x, i.y, i.type, i.name, i.value); Object.assign(it, i); return it;
                    });
                    this.map.data = obj.mapData; this.map.rooms = obj.mapRooms;
                    this.player.inv = reconstruct(p.inv); this.storage = reconstruct(obj.storage);
                    this.baseItems = reconstruct(obj.baseItems); this.items = reconstruct(obj.items);
                    this.player.x = p.x; this.player.y = p.y;
                    this.enemies = obj.enemies.map(e => { const en = new Enemy(e.x, e.y, e.type); Object.assign(en, e); return en; });
                    this.player.equipAtk = this.player.inv.find(i => i.isEquipped && i.type === 'disk_atk') || null;
                    this.player.equipDef = this.player.inv.find(i => i.isEquipped && i.type === 'disk_def') || null;
                    this.player.equipAcc = this.player.inv.find(i => i.isEquipped && i.type === 'disk_acc') || null;
                    this.player.equipAbi = this.player.inv.find(i => i.isEquipped && i.type === 'disk_abi') || null;
                    UI.log("データを復元しました。"); UI.updateStatus(this.player, this.floor);
                    this.updateBackground(); // 背景をロード後に確実に更新
                    this.updateAwakenButton(); this.draw(); return true;
                } catch (e) { console.error('ロードエラー', e); return false; }
            }

            openSaveLoadMenu(isTitleMode = false) {
                const listDiv = document.getElementById('saveload-list');
                listDiv.innerHTML = '';
                for (let slot = 1; slot <= 3; slot++) {
                    const key = `diabolo_roguelike_save_slot${slot}`;
                    const raw = localStorage.getItem(key);
                    let label = `スロット ${slot}：空き`, info = '';
                    if (raw) {
                        try {
                            const o = JSON.parse(raw);
                            label = `スロット ${slot}：地下${o.floor}階 Lv${o.player.lv}`;
                            info = o.savedAt ? new Date(o.savedAt).toLocaleString('ja-JP') : '不明';
                        } catch (e) { }
                    }
                    const slotDiv = document.createElement('div');
                    slotDiv.style.cssText = 'padding:10px;margin:6px 0;background:#2a2a2a;border-radius:6px;border:1px solid #555;';
                    slotDiv.innerHTML = `<div style="font-size:14px;font-weight:bold;margin-bottom:4px;">${label}</div>` +
                        (info ? `<div style="font-size:11px;color:#aaa;margin-bottom:6px;">${info}</div>` : '');
                    const btnRow = document.createElement('div');
                    btnRow.style.cssText = 'display:flex;gap:8px;';
                    if (!isTitleMode) {
                        const saveBtn = document.createElement('button');
                        saveBtn.textContent = 'セーブ';
                        saveBtn.style.cssText = 'flex:1;padding:6px;background:#1565c0;color:#fff;border:none;border-radius:4px;font-size:13px;cursor:pointer;';
                        saveBtn.onclick = () => { this.saveGameSlot(slot); this.openSaveLoadMenu(); };
                        btnRow.appendChild(saveBtn);
                    }
                    const loadBtn = document.createElement('button');
                    loadBtn.textContent = 'ロード';
                    loadBtn.disabled = !raw;
                    loadBtn.style.cssText = `flex:1;padding:6px;background:${raw ? '#388e3c' : '#555'};color:#fff;border:none;border-radius:4px;font-size:13px;cursor:${raw ? 'pointer' : 'default'};`;
                    if (raw) loadBtn.onclick = () => {
                        if (this.loadGameSlot(slot)) {
                            document.getElementById('saveload-modal').classList.remove('active');
                            if (isTitleMode) {
                                const ts = document.getElementById('title-screen');
                                ts.classList.add('hidden');
                                setTimeout(() => { ts.style.display = 'none'; }, 1000);
                            }
                            this.draw();
                        }
                    };
                    btnRow.appendChild(loadBtn);
                    slotDiv.appendChild(btnRow);
                    listDiv.appendChild(slotDiv);
                }
                document.getElementById('saveload-modal').classList.add('active');
            }

            saveGameSlot(slot) {
                const saveObj = {
                    savedAt: Date.now(), floor: this.floor, isAtBase: this.isAtBase, player: this.player,
                    mapData: this.map.data, mapRooms: this.map.rooms, enemies: this.enemies, items: this.items,
                    baseItems: this.baseItems, storage: this.storage
                };
                localStorage.setItem(`diabolo_roguelike_save_slot${slot}`, JSON.stringify(saveObj));
                UI.log(`スロット${slot}にセーブしました。`);

                // セーブ成功後に確認ダイアログを表示
                setTimeout(() => {
                    UI.showConfirm(`スロット${slot}にセーブしました。\nタイトルに戻りますか？`, () => {
                        this.backToTitle();
                    });
                }, 500);
            }

            backToTitle() {
                // すべてのモーダルを閉じる
                document.getElementById('saveload-modal').classList.remove('active');
                document.getElementById('menu-modal').classList.remove('active');
                document.getElementById('conversation-modal').style.display = 'none';

                // タイトル画面を表示
                const ts = document.getElementById('title-screen');
                ts.style.display = 'flex';
                ts.classList.remove('hidden');

                // BGM をタイトル用に強制的に更新
                this.playBgm('Assets/titlebgm.mp3');
            }

            loadGameSlot(slot) {
                const raw = localStorage.getItem(`diabolo_roguelike_save_slot${slot}`);
                if (!raw) return false;
                try {
                    const o = JSON.parse(raw);
                    this.floor = o.floor; this.isAtBase = o.isAtBase || false;
                    this.baseItems = o.baseItems || []; this.storage = o.storage || [];
                    const p = o.player;
                    this.player.lv = p.lv; this.player.hp = p.hp; this.player.maxHp = p.maxHp;
                    this.player.str = p.str; this.player.def = p.def; this.player.food = p.food;
                    this.player.maxFood = p.maxFood; this.player.direction = p.direction;
                    this.player.fullnessDuration = p.fullnessDuration || 0;
                    this.player.awakenGauge = p.awakenGauge || 0; this.player.awakenTurns = p.awakenTurns || 0;
                    this.player.isDirectionMode = p.isDirectionMode || false;
                    const reconstruct = list => (list || []).map(i => {
                        const it = new Item(i.x, i.y, i.type, i.name, i.value); Object.assign(it, i); return it;
                    });
                    this.map.data = o.mapData; this.map.rooms = o.mapRooms;
                    this.player.inv = reconstruct(p.inv); this.storage = reconstruct(o.storage);
                    this.baseItems = reconstruct(o.baseItems); this.items = reconstruct(o.items);
                    this.player.x = p.x; this.player.y = p.y;
                    this.enemies = o.enemies.map(e => { const en = new Enemy(e.x, e.y, e.type); Object.assign(en, e); return en; });
                    this.player.equipAtk = this.player.inv.find(i => i.isEquipped && i.type === 'disk_atk') || null;
                    this.player.equipDef = this.player.inv.find(i => i.isEquipped && i.type === 'disk_def') || null;
                    this.player.equipAcc = this.player.inv.find(i => i.isEquipped && i.type === 'disk_acc') || null;
                    this.player.equipAbi = this.player.inv.find(i => i.isEquipped && i.type === 'disk_abi') || null;
                    UI.log(`スロット${slot}からロードしました。`); UI.updateStatus(this.player, this.floor);
                    this.updateBackground(); this.updateAwakenButton(); this.updateBgm(); this.draw(); return true;
                } catch (e) { console.error('スロットロードエラー', e); return false; }
            }
        }

        // 起動処理
        let game;
        window.addEventListener('load', () => {
            // オートプレイ制限対策：どこをクリック/キー入力してもBGM再生を再試行する
            const resumeBgm = () => {
                if (window.SoundManager) {
                    SoundManager.resumeBgm();
                }
            };
            document.addEventListener('mousedown', resumeBgm);
            document.addEventListener('keydown', resumeBgm);
            document.addEventListener('touchstart', resumeBgm);

            const titleScreen = document.getElementById('title-screen');
            const btnStart = document.getElementById('btn-title-start');
            const btnContinue = document.getElementById('btn-title-continue');

            PixelArtEngine.loadTextures(TILE_SIZE).then(() => {
                game = new GameManager();

                // セーブデータの有無（スロット1-3）を確認
                let hasAnySave = false;
                for (let i = 1; i <= 3; i++) {
                    if (localStorage.getItem(`diabolo_roguelike_save_slot${i}`)) {
                        hasAnySave = true;
                        break;
                    }
                }

                if (!hasAnySave) {
                    btnContinue.classList.add('disabled');
                    btnContinue.style.opacity = '0.5';
                    btnContinue.style.cursor = 'not-allowed';
                }

                // タイトルBGMの再生（ユーザー操作を待機）
                const startTitleBGM = async () => {
                    await SoundManager.init();
                    SoundManager.playUI(); // 起動音
                    if (titleScreen.style.display !== 'none') {
                        game.playBgm('Assets/titlebgm.mp3');
                    }
                    document.removeEventListener('click', startTitleBGM);
                    document.removeEventListener('keydown', startTitleBGM);
                };
                document.addEventListener('click', startTitleBGM);
                document.addEventListener('keydown', startTitleBGM);

                // START ボタン：新規ゲーム開始（状態をリセット）
                btnStart.addEventListener('click', () => {
                    game.resetGame(); // 状態を初期化
                    showIntroConversation(() => {
                        game.initFloor();
                        startGame();
                    });
                });

                // 会話イベントの表示
                function showIntroConversation(onComplete) {
                    const script = [
                        { name: 'もちにゃふぇ', text: '…ふぇ〜〜、あれ？いつものように、にゃんるなちゃんの側で寝ていた気がしたんだけどな…', icon: 'Assets/moti.png' },
                        { name: 'もちにゃふぇ', text: 'そもそも何でしゃべれるんだろ？なんだか不思議な場所だな、そこに階段がある、行ってみよう！！', icon: 'Assets/moti.png' }
                    ];
                    UI.showConversation(script, onComplete);
                }

                // CONTINUE ボタン：スロット選択画面を表示
                btnContinue.addEventListener('click', () => {
                    if (!btnContinue.classList.contains('disabled')) {
                        game.openSaveLoadMenu(true);
                    } else {
                        UI.log("セーブデータが見つかりません。");
                    }
                });

                function startGame() {
                    titleScreen.classList.add('hidden');
                    game.draw();
                    // フェードアウト完了後に要素を完全に非表示にする
                    setTimeout(() => {
                        titleScreen.style.display = 'none';
                    }, 1000);
                }
            });
        });
    </script>
</body>

</html>

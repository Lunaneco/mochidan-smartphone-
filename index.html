<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>もちにゃふぇの迷宮大冒険</title>
    <!-- Tone.js -->
    <script src="Tone.js"></script>
    <style>
        :root {
            --bg-color: #111;
            --ui-bg: #222;
            --text-color: #eee;
            --border-color: #555;
            --accent-color: #d32f2f;
            --tile-size: 24px;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none; /* iOSで長押しメニューを禁止 */
            -webkit-tap-highlight-color: transparent; /* タップ時のハイライトを消す */
            touch-action: manipulation; /* ダブルタップズームを防止 */
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #game-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            max-width: 600px;
            /* PCなどでは中央寄せになるよう制限 */
            margin: 0 auto;
            position: relative;
        }

        /* ステータスバー */
        #status-bar {
            background-color: var(--ui-bg);
            border-bottom: 2px solid var(--border-color);
            padding: 4px 6px;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            z-index: 10;
            flex-shrink: 0;
        }

        #status-bar div {
            flex: 1;
            text-align: center;
        }

        /* スマホ画面で文字を少し大きく */
        @media (min-width: 375px) {
            #status-bar { font-size: 13px; }
        }

        /* ゲームキャンバス領域 */
        #canvas-container {
            flex: 1;
            position: relative;
            background-color: #000;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            touch-action: none;
            /* スクロール防止 */
            overflow: hidden;
        }

        canvas {
            display: block;
        }

        /* ログウィンドウ（画面上部にかぶせる） */
        #log-window {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 90px;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.9) 0%, rgba(0, 0, 0, 0) 100%);
            color: #fff;
            padding: 8px 10px;
            font-size: 12px;
            overflow-y: hidden;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            text-shadow: 1px 1px 2px #000;
        }

        .log-message {
            margin: 1px 0;
        }

        /* コントロールパネル */
        #control-panel {
            background-color: var(--ui-bg);
            border-top: 2px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 5px;
            gap: 4px;
            z-index: 10;
            flex-shrink: 0;
        }

        /* スワイプヒント表示 */
        #swipe-hint {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 2px 0;
        }

        #swipe-hint span {
            font-size: 10px;
            color: #888;
            letter-spacing: 1px;
        }

        /* 方向キー（折りたたみ式） */
        #dir-pad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 3px;
            height: 110px; /* 展開時の高さ */
            overflow: hidden;
            transition: height 0.25s ease, opacity 0.25s ease;
            touch-action: none; /* スマホでの誤ズーム・スクロール防止 */
        }

        #dir-pad.collapsed {
            height: 0;
            opacity: 0;
            pointer-events: none;
        }

        .btn-pad {
            background-color: #333;
            border: 1px solid #555;
            color: #fff;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            min-height: 32px;
        }

        .btn-pad:active {
            background-color: #555;
        }

        .btn-pad.hidden {
            visibility: hidden;
        }

        .btn-pad.change-mode {
            background-color: #d32f2f;
            border-color: #ff5252;
            font-weight: bold;
        }

        /* アクションボタン群 */
        #action-pad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: 1fr;
            gap: 5px;
            height: 52px;
            touch-action: none; /* スマホでの誤ズーム・スクロール防止 */
        }

        .btn-action {
            background-color: #444;
            border: 1px solid #666;
            color: #fff;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-action.attack {
            background-color: var(--accent-color);
            border-color: #b71c1c;
        }

        @keyframes rainbow {
            0% {
                background: #d32f2f;
                border-color: #ff5252;
            }

            16% {
                background: #e65100;
                border-color: #ff6d00;
            }

            33% {
                background: #f9a825;
                border-color: #ffd600;
            }

            50% {
                background: #1b5e20;
                border-color: #00e676;
            }

            66% {
                background: #0d47a1;
                border-color: #2979ff;
            }

            83% {
                background: #4a148c;
                border-color: #e040fb;
            }

            100% {
                background: #d32f2f;
                border-color: #ff5252;
            }
        }

        .btn-action.awakened {
            animation: rainbow 1.2s linear infinite;
            border-width: 2px;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.6);
            font-size: 13px;
        }

        .btn-action.awaken-active {
            background: linear-gradient(135deg, #f9a825, #ff5252);
            border-color: #ffd600;
            box-shadow: 0 0 14px rgba(255, 214, 0, 0.8);
        }

        .btn-action:active {
            filter: brightness(1.2);
        }

        /* メニューモーダル (初期非表示) */
        #menu-modal,
        #saveload-modal {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.8);
            z-index: 300;
            display: none;
            flex-direction: column;
            padding: 20px;
        }

        #menu-modal.active,
        #saveload-modal.active {
            display: flex;
        }

        .menu-inner {
            background-color: #222;
            border: 2px solid #555;
            border-radius: 8px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
        }

        .menu-header {
            padding: 10px;
            text-align: center;
            background: #333;
            border-bottom: 1px solid #555;
            font-weight: bold;
        }

        .menu-content {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .menu-footer {
            padding: 10px;
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            border-top: 1px solid #555;
        }

        .btn-close {
            padding: 8px 16px;
            background-color: #555;
            color: #fff;
            border: none;
            border-radius: 4px;
        }

        .btn-sort {
            padding: 8px 16px;
            background-color: #3a7bd5;
            color: #fff;
            border: none;
            border-radius: 4px;
        }

        /* タイトル画面 */
        #title-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            background-image: url('Assets/title.jpg');
            background-size: cover;
            background-position: center;
            z-index: 200;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 80px;
            transition: opacity 1s ease-in-out;
        }

        #title-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .title-logo {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding-top: 50px;
        }

        .title-logo-text {
            font-size: 32px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.8), 2px 2px 4px rgba(0, 0, 0, 1);
            letter-spacing: 4px;
            text-align: center;
            line-height: 1.4;
        }

        .title-menu {
            width: 80%;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: rgba(0, 0, 0, 0.4);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        .btn-title {
            padding: 15px;
            background: linear-gradient(135deg, rgba(211, 47, 47, 0.8), rgba(183, 28, 28, 0.9));
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }

        .btn-title:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(211, 47, 47, 0.4);
            background: linear-gradient(135deg, rgba(239, 83, 80, 0.9), rgba(211, 47, 47, 1));
        }

        .btn-title:active {
            transform: translateY(1px);
        }

        .btn-title.disabled {
            background: rgba(80, 80, 80, 0.6);
            border-color: rgba(255, 255, 255, 0.1);
            color: #888;
            cursor: not-allowed;
            pointer-events: none;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
        }

        .title-copyright {
            margin-top: 20px;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.6);
            text-align: center;
        }

        /* 会話ウィンドウ */
        #conversation-modal {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 200px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 500;
            display: none;
            flex-direction: column;
            border-top: 2px solid #d32f2f;
            padding: 15px;
            cursor: pointer;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
            }

            to {
                transform: translateY(0);
            }
        }

        #conversation-content {
            display: flex;
            gap: 15px;
            height: 100%;
        }

        #conversation-icon {
            width: 80px;
            height: 80px;
            object-fit: contain;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            flex-shrink: 0;
        }

        #conversation-text-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        #conversation-name {
            font-size: 16px;
            font-weight: bold;
            color: #ff5252;
            border-bottom: 1px solid rgba(255, 82, 82, 0.3);
            padding-bottom: 4px;
            margin-bottom: 8px;
        }

        #conversation-text {
            font-size: 15px;
            line-height: 1.6;
            color: #eee;
        }

        #conversation-instruction {
            position: absolute;
            bottom: 10px;
            right: 15px;
            font-size: 10px;
            color: #888;
            letter-spacing: 1px;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 0.3;
            }

            50% {
                opacity: 1;
            }
        }

        /* 確認モーダル */
        #confirm-modal {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            z-index: 600;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #confirm-modal.active {
            display: flex;
        }

        .confirm-inner {
            background: rgba(40, 40, 40, 0.95);
            border: 2px solid #ff5252;
            border-radius: 12px;
            padding: 25px;
            width: 100%;
            max-width: 320px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .confirm-text {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 25px;
            line-height: 1.5;
            color: #fff;
            text-shadow: 1px 1px 2px #000;
        }

        .confirm-buttons {
            display: flex;
            gap: 15px;
        }

        .btn-confirm {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            transition: transform 0.1s, filter 0.1s;
        }

        .btn-confirm:active {
            transform: scale(0.95);
        }

        .btn-confirm.yes {
            background: linear-gradient(135deg, #d32f2f, #b71c1c);
            color: #fff;
            box-shadow: 0 4px 10px rgba(211, 47, 47, 0.4);
        }

        .btn-confirm.no {
            background: #444;
            color: #fff;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .btn-confirm:hover {
            filter: brightness(1.2);
        }

        /* クリア・真エンディング画面オーバーレイ */
        #clear-overlay,
        #true-end-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            z-index: 2000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 2s ease;
        }

        #clear-overlay.active,
        #true-end-overlay.active {
            display: flex;
            opacity: 1;
        }

        #true-end-overlay {
            background: radial-gradient(circle, #2a2200 0%, #000 100%);
        }

        #clear-img,
        #true-end-img {
            max-width: 80%;
            max-height: 60%;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
            margin-bottom: 20px;
            border: 3px solid #fff;
        }

        #true-end-img {
            border: 3px solid #ffd700;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.5);
        }

        #clear-text,
        #true-end-text {
            font-size: 48px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 15px rgba(255, 204, 0, 0.8);
            letter-spacing: 10px;
            animation: glow 2s ease-in-out infinite alternate;
        }

        #true-end-text {
            color: #ffd700;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.8);
            animation: glow-gold 3s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 30px #ffcc00;
            }

            to {
                text-shadow: 0 0 20px #fff, 0 0 30px #ff5252, 0 0 40px #ff5252;
            }
        }

        @keyframes glow-gold {
            from {
                text-shadow: 0 0 15px #ffd700, 0 0 30px #ffd700, 0 0 50px #ff8c00;
            }

            to {
                text-shadow: 0 0 25px #ffd700, 0 0 45px #fff, 0 0 65px #ff8c00;
            }
        }
    </style>
</head>

<body>
    <div id="game-container">
        <!-- クリア画面 -->
        <div id="clear-overlay">
            <img src="Assets/clear.jpg" id="clear-img" alt="CLEARED!">
            <div id="clear-text">CLEAR!</div>
        </div>
        <!-- 真エンディング画面 -->
        <div id="true-end-overlay">
            <img src="Assets/trueend.jpg" id="true-end-img" alt="TRUE END!">
            <div id="true-end-text">TRUE END</div>
        </div>

        <!-- ステータスバー -->
        <div id="status-bar">
            <div>地下 <span id="val-floor">1</span>階</div>
            <div>Lv <span id="val-lv">1</span></div>
            <div>HP <span id="val-hp">15</span>/<span id="val-maxhp">15</span></div>
            <div>満腹 <span id="val-food">100</span>%</div>
        </div>

        <!-- キャバスエリア -->
        <div id="canvas-container">
            <canvas id="game-canvas"></canvas>
            <!-- ログウィンドウ -->
            <div id="log-window"></div>
        </div>

        <!-- コントロールパネル -->
        <div id="control-panel">
            <!-- スワイプヒント＋方向パッド切り替えボタン -->
            <div id="swipe-hint">
                <span>← スワイプで移動 →</span>
                <div class="btn-pad" id="btn-dir-change" style="padding:2px 10px;font-size:11px;height:22px;min-height:unset;">方向パッド</div>
            </div>
            <!-- 折りたたみ式方向キー -->
            <div id="dir-pad" class="collapsed">
                <div class="btn-pad" data-dir="7">↖</div>
                <div class="btn-pad" data-dir="8">↑</div>
                <div class="btn-pad" data-dir="9">↗</div>
                <div class="btn-pad" data-dir="4">←</div>
                <div class="btn-pad" id="btn-dir-pad-center">向</div>
                <div class="btn-pad" data-dir="6">→</div>
                <div class="btn-pad" data-dir="1">↙</div>
                <div class="btn-pad" data-dir="2">↓</div>
                <div class="btn-pad" data-dir="3">↘</div>
            </div>
            <!-- アクションボタン (横一列) -->
            <div id="action-pad">
                <div class="btn-action attack" id="btn-attack">攻撃</div>
                <div class="btn-action" id="btn-stay">セーブ</div>
                <div class="btn-action" id="btn-menu">メニュー</div>
                <div class="btn-action" id="btn-action">覚醒</div>
            </div>
        </div>

        <!-- セーブ/ロード画面 -->
        <div id="saveload-modal">
            <div class="menu-inner">
                <div class="menu-header">セーブ / ロード</div>
                <div class="menu-content" id="saveload-list"></div>
                <div class="menu-footer">
                    <button class="btn-close" id="btn-saveload-close">閉じる</button>
                </div>
            </div>
        </div>

        <!-- 確認ダイアログ -->
        <div id="confirm-modal">
            <div class="confirm-inner">
                <div class="confirm-text" id="confirm-msg">メッセージ</div>
                <div class="confirm-buttons">
                    <button class="btn-confirm yes" id="btn-confirm-yes">はい (YES)</button>
                    <button class="btn-confirm no" id="btn-confirm-no">いいえ (NO)</button>
                </div>
            </div>
        </div>

        <!-- インベントリ等メニュー画面 -->
        <div id="menu-modal">
            <div class="menu-inner">
                <div class="menu-header">メニュー</div>
                <div class="menu-content" id="menu-list">
                    (アイテムがありません)
                </div>
                <div class="menu-footer">
                    <button class="btn-sort" id="btn-menu-sort">並べる</button>
                    <button class="btn-close" id="btn-menu-close">閉じる</button>
                </div>
            </div>
        </div>

        <!-- 会話モーダル -->
        <div id="conversation-modal">
            <div id="conversation-content">
                <img src="Assets/moti.png" alt="もちにゃふぇ" id="conversation-icon">
                <div id="conversation-text-container">
                    <div id="conversation-name">もちにゃふぇ</div>
                    <div id="conversation-text"></div>
                </div>
            </div>
            <div id="conversation-instruction">▼ TAP TO NEXT</div>
        </div>

        <!-- タイトル画面 -->
        <div id="title-screen">

            <div class="title-menu">
                <div class="btn-title" id="btn-title-start">START</div>
                <div class="btn-title" id="btn-title-continue">CONTINUE</div>
                <div class="title-copyright">&copy; 2026 Lunaneco Games</div>
            </div>
        </div>
    </div>

    <!-- ゲームロジック -->
    <script>
        // 定数
        const TILE_SIZE = 32;
        const MAP_WIDTH = 40;
        const MAP_HEIGHT = 40;
        const TILE = {
            WALL: 0,
            FLOOR: 1,
            DOOR: 2,
            PASSAGE: 3,
            STAIRS: 4,
            STORAGE: 5,
            BASE_EXIT: 6,
            OUT_BOUNDARY: 7 // どんな能力でも通れない最外周の壁
        };

        // 効果音（SE）管理
        const SoundManager = {
            initialized: false,
            uiSynth: null,
            actionSynth: null,
            noiseSynth: null,
            bgm: new Audio(),
            intendedBgmPath: '',

            async init() {
                if (this.initialized) return;
                try {
                    await Tone.start();

                    // UI用シンセ (短く高い音)
                    this.uiSynth = new Tone.PolySynth(Tone.Synth, {
                        oscillator: { type: "square" },
                        envelope: { attack: 0.01, decay: 0.05, sustain: 0, release: 0.1 }
                    }).toDestination();
                    this.uiSynth.volume.value = -15;

                    // アクション用シンセ (アイテム取得など)
                    this.actionSynth = new Tone.PolySynth(Tone.Synth, {
                        oscillator: { type: "triangle" },
                        envelope: { attack: 0.02, decay: 0.2, sustain: 0.2, release: 0.5 }
                    }).toDestination();
                    this.actionSynth.volume.value = -10;

                    // ノイズシンセ (ダメージ、鈍い音)
                    this.noiseSynth = new Tone.NoiseSynth({
                        noise: { type: "brown" },
                        envelope: { attack: 0.01, decay: 0.2, sustain: 0 }
                    }).toDestination();
                    this.noiseSynth.volume.value = -10;

                    this.initialized = true;
                    /* 起動ログ省略 */

                    // すでにBGMパスが設定されている場合は再生を試みる
                    this.resumeBgm();
                } catch (e) {
                    console.error("Failed to initialize Tone.js", e);
                }
            },

            playBgm(path) {
                if (this.intendedBgmPath === path) return;
                this.intendedBgmPath = path;

                // 単一のAudio要素を使い回す
                this.bgm.pause();
                this.bgm.src = path;
                this.bgm.loop = true;

                // 音量を少し下げておく（環境に合わせて調整）
                this.bgm.volume = 0.5;

                this.bgm.play().catch(e => {
                    /* BGMオートプレイ遅延 */
                });
            },

            resumeBgm() {
                if (this.intendedBgmPath && this.bgm.paused) {
                    this.bgm.play().catch(e => {
                        // まだインタラクションが足りないなどの場合は無視
                    });
                }
            },

            playUI() {
                if (!this.initialized) return;
                this.uiSynth.triggerAttackRelease("C6", "32n");
            },

            playAttack() {
                if (!this.initialized) return;
                // 鋭いノイズ + シンセ
                this.noiseSynth.triggerAttackRelease("16n");
                this.actionSynth.triggerAttackRelease("C4", "16n");
            },

            playDamage() {
                if (!this.initialized) return;
                // 低いノイズ
                this.noiseSynth.noise.type = "pink";
                this.noiseSynth.triggerAttackRelease("8n");
                setTimeout(() => { this.noiseSynth.noise.type = "brown"; }, 200);
            },

            playItemGet() {
                if (!this.initialized) return;
                const now = Tone.now();
                this.uiSynth.triggerAttackRelease("E5", "16n", now);
                this.uiSynth.triggerAttackRelease("G5", "16n", now + 0.1);
                this.uiSynth.triggerAttackRelease("C6", "8n", now + 0.2);
            },

            playStairs() {
                if (!this.initialized) return;
                const now = Tone.now();
                this.actionSynth.triggerAttackRelease("C4", "8n", now);
                this.actionSynth.triggerAttackRelease("G3", "8n", now + 0.15);
                this.actionSynth.triggerAttackRelease("E3", "8n", now + 0.3);
            },

            playLevelUp() {
                if (!this.initialized) return;
                const now = Tone.now();
                this.actionSynth.triggerAttackRelease(["C4", "E4", "G4"], "8n", now);
                this.actionSynth.triggerAttackRelease(["F4", "A4", "C5"], "8n", now + 0.2);
                this.actionSynth.triggerAttackRelease(["G4", "B4", "D5"], "8n", now + 0.4);
                this.actionSynth.triggerAttackRelease(["C5", "E5", "G5"], "2n", now + 0.6);
            }
        };

        // マップデータ管理
        class DungeonMap {
            constructor(w, h) {
                this.width = w;
                this.height = h;
                this.data = new Array(h).fill(0).map(() => new Array(w).fill(TILE.WALL));
                this.rooms = [];
            }

            // BSP（二分空間分割）ベースのマップ生成
            generate() {
                this.data = new Array(this.height).fill(0).map(() => new Array(this.width).fill(TILE.WALL));
                this.rooms = [];

                const MIN_SIZE = 6; // 最小分割サイズ
                const MAX_ROOM_SIZE = 8;
                const MIN_ROOM_SIZE = 4;

                // 外周を絶対不透過壁で埋める
                for (let y = 0; y < this.height; y++) {
                    for (let x = 0; x < this.width; x++) {
                        if (x === 0 || x === this.width - 1 || y === 0 || y === this.height - 1) {
                            this.data[y][x] = TILE.OUT_BOUNDARY;
                        }
                    }
                }

                // 外周を絶対不透過壁で埋める
                for (let y = 0; y < this.height; y++) {
                    for (let x = 0; x < this.width; x++) {
                        if (x === 0 || x === this.width - 1 || y === 0 || y === this.height - 1) {
                            this.data[y][x] = TILE.OUT_BOUNDARY;
                        }
                    }
                }

                // 領域分割
                let regions = [{ x: 1, y: 1, w: this.width - 2, h: this.height - 2 }];
                let attempt = 0;
                while (regions.length < 6 && attempt < 20) {
                    attempt++;
                    const target = regions[Math.floor(Math.random() * regions.length)];
                    if (target.w < MIN_SIZE * 2 || target.h < MIN_SIZE * 2) continue; // 分割するには小さすぎる

                    const splitH = Math.random() > 0.5;
                    if (splitH && target.h >= MIN_SIZE * 2) {
                        const splitY = target.y + MIN_SIZE + Math.floor(Math.random() * (target.h - MIN_SIZE * 2));
                        regions.push({ x: target.x, y: splitY, w: target.w, h: target.h - (splitY - target.y) });
                        target.h = splitY - target.y;
                    } else if (!splitH && target.w >= MIN_SIZE * 2) {
                        const splitX = target.x + MIN_SIZE + Math.floor(Math.random() * (target.w - MIN_SIZE * 2));
                        regions.push({ x: splitX, y: target.y, w: target.w - (splitX - target.x), h: target.h });
                        target.w = splitX - target.x;
                    }
                }

                // 部屋の作成
                regions.forEach(r => {
                    const rw = Math.floor(Math.random() * (MAX_ROOM_SIZE - MIN_ROOM_SIZE)) + MIN_ROOM_SIZE;
                    const rh = Math.floor(Math.random() * (MAX_ROOM_SIZE - MIN_ROOM_SIZE)) + MIN_ROOM_SIZE;
                    const rx = r.x + Math.floor(Math.random() * (r.w - rw));
                    const ry = r.y + Math.floor(Math.random() * (r.h - rh));

                    // 領域に収まるように制限
                    const actualRw = Math.min(rw, r.w - 1);
                    const actualRh = Math.min(rh, r.h - 1);

                    for (let y = ry; y < ry + actualRh; y++) {
                        for (let x = rx; x < rx + actualRw; x++) {
                            this.data[y][x] = TILE.FLOOR;
                        }
                    }
                    this.rooms.push({ x: rx, y: ry, w: actualRw, h: actualRh, cx: rx + Math.floor(actualRw / 2), cy: ry + Math.floor(actualRh / 2) });
                });

                // 通路でつなぐ（簡易版：全室を順番に中心同士でつなぐ）
                for (let i = 0; i < this.rooms.length - 1; i++) {
                    let r1 = this.rooms[i];
                    let r2 = this.rooms[i + 1];
                    let x = r1.cx;
                    let y = r1.cy;

                    // ランダムな順序でXYをつなぐ
                    if (Math.random() > 0.5) {
                        while (x !== r2.cx) { x += (x < r2.cx ? 1 : -1); if (this.data[y][x] === TILE.WALL) this.data[y][x] = TILE.PASSAGE; }
                        while (y !== r2.cy) { y += (y < r2.cy ? 1 : -1); if (this.data[y][x] === TILE.WALL) this.data[y][x] = TILE.PASSAGE; }
                    } else {
                        while (y !== r2.cy) { y += (y < r2.cy ? 1 : -1); if (this.data[y][x] === TILE.WALL) this.data[y][x] = TILE.PASSAGE; }
                        while (x !== r2.cx) { x += (x < r2.cx ? 1 : -1); if (this.data[y][x] === TILE.WALL) this.data[y][x] = TILE.PASSAGE; }
                    }
                }

                // 階段の配置（最後の部屋）
                const lastRoom = this.rooms[this.rooms.length - 1];
                this.data[lastRoom.cy][lastRoom.cx] = TILE.STAIRS;
            }

            // ボスフロア（10階）用マップ生成：中央に大きな部屋一つ
            generateBossFloor() {
                this.data = new Array(this.height).fill(0).map((_, y) => {
                    return new Array(this.width).fill(0).map((__, x) => {
                        if (x === 0 || x === this.width - 1 || y === 0 || y === this.height - 1) {
                            return TILE.OUT_BOUNDARY;
                        }
                        return TILE.WALL;
                    });
                });
                this.rooms = [];

                // 工ネタ: マップ中心に幅16x14の平度な大部屋を一つ
                const rw = 16;
                const rh = 14;
                const rx = Math.floor(this.width / 2) - Math.floor(rw / 2);
                const ry = Math.floor(this.height / 2) - Math.floor(rh / 2);

                for (let y = ry; y < ry + rh; y++) {
                    for (let x = rx; x < rx + rw; x++) {
                        this.data[y][x] = TILE.FLOOR;
                    }
                }

                const cx = rx + Math.floor(rw / 2);
                const cy = ry + Math.floor(rh / 2);
                this.rooms.push({ x: rx, y: ry, w: rw, h: rh, cx, cy });
                // 階段なし（ボス撃破後に動的生成）
            }

            getTile(x, y) {
                if (x < 0 || x >= this.width || y < 0 || y >= this.height) return TILE.OUT_BOUNDARY; // 範囲外はOUT_BOUNDARY
                return this.data[y][x];
            }

            isWalkable(x, y) {
                if (x < 0 || x >= this.width || y < 0 || y >= this.height) return false;
                const t = this.data[y][x];
                return t !== TILE.WALL && t !== TILE.OUT_BOUNDARY;
            }

            // 拠点の生成（固定レイアウト）
            generateBase() {
                this.data = new Array(this.height).fill(0).map(() => new Array(this.width).fill(TILE.WALL));
                this.rooms = [];

                // 中央に小さな部屋(10x10)を作成
                const cx = Math.floor(this.width / 2);
                const cy = Math.floor(this.height / 2);
                const size = 5;
                for (let y = cy - size; y <= cy + size; y++) {
                    for (let x = cx - size; x <= cx + size; x++) {
                        this.data[y][x] = TILE.FLOOR;
                    }
                }

                // 倉庫タイルを配置
                this.data[cy - 2][cx - 2] = TILE.STORAGE;
                // ダンジョン出口（階段の代わり）を配置
                this.data[cy][cx + 4] = TILE.BASE_EXIT;

                this.rooms.push({ x: cx - size, y: cy - size, w: size * 2 + 1, h: size * 2 + 1, cx: cx, cy: cy });
            }

            // 巨大な1フロア広場を生成（30階用）
            generateWideOpenFloor() {
                this.data = Array(this.height).fill(null).map(() => Array(this.width).fill(TILE.WALL));
                this.rooms = [];
                const margin = 5;
                const rw = this.width - margin * 2;
                const rh = this.height - margin * 2;
                const rx = margin;
                const ry = margin;

                for (let y = ry; y < ry + rh; y++) {
                    for (let x = rx; x < rx + rw; x++) {
                        this.data[y][x] = TILE.FLOOR;
                    }
                }
                this.rooms.push({ x: rx, y: ry, w: rw, h: rh, cx: Math.floor(rx + rw / 2), cy: Math.floor(ry + rh / 2) });
            }
        }

        // 敵キャラクター
        class Enemy extends Entity {
            constructor(x, y, type, isGod = false) {
                super(x, y);
                this.baseType = type || 'スライム';
                this.isGod = isGod;
                this.type = isGod ? `ゴッド${this.baseType}` : this.baseType;

                const def = ENEMY_DEFS[this.baseType] || ENEMY_DEFS['スライム'];
                const scale = isGod ? 2 : 1;

                this.hp = def.hp * scale;
                this.maxHp = def.hp * scale;
                this.str = def.str * scale;
                this.def = def.def * scale;
                this.exp = def.exp * scale;
                this.spriteName = def.sprite;
                this.isFiring = false;
                this.fireDir = { x: 0, y: 0 };
                this.fireDist = 0;
                this.isDefending = false; // アダマン・シェル用
                this.isRoaring = false;   // 咆哮エフェクト用
                this.isTremoring = false; // 踏みつけエフェクト用
                this.isPrickly = false;  // ハリネズミのトゲ攻撃用
                this.isDarkAura = false; // ダークもちにゃふぇ用
                this.canPhaseWall = def.canPhaseWall || false; // 壁貫通能力
                this.size = def.size || 1; // ユニットサイズ

                // 創造主専用
                this.phase = 1;
                this.isPhase2 = false;
                this.activeEffect = null; // null | 'genesis' | 'holy_pulse' | 'apocalypt'
                this.effectX = 0;
                this.effectY = 0;
            }

            // プレイヤーへの追尾・攻撃AI
            act(player, map, enemies, gameManager) {
                if (this.hp <= 0) return;

                const dx = player.x - this.x;
                const dy = player.y - this.y;
                const dist = Math.max(Math.abs(dx), Math.abs(dy));
                const size = this.size;
                const adjToPlayer = (
                    player.x >= this.x - 1 && player.x <= this.x + size &&
                    player.y >= this.y - 1 && player.y <= this.y + size &&
                    !(player.x >= this.x && player.x < this.x + size &&
                        player.y >= this.y && player.y < this.y + size)
                );

                // --- ラスボス: ダークもちにゃふぇ AI ---
                if (this.type === 'ダークもちにゃふぇ') {
                    if (this.hp < this.maxHp * 0.3 && Math.random() < 0.1) {
                        const room = map.rooms[0];
                        this.x = room.x + Math.floor(Math.random() * room.w);
                        this.y = room.y + Math.floor(Math.random() * room.h);
                        UI.log("ダークもちにゃふぇは影に溶け込み、別の場所に現れた！");
                        return;
                    }
                    if (dist <= 3 && Math.random() < 0.2) {
                        UI.log("ダークもちにゃふぇの周囲から闇の炎が噴き上がる！");
                        this.isFiring = true;
                        this.fireDir = { x: 0, y: 0 };
                        this.fireDist = 2;
                        setTimeout(() => { this.isFiring = false; }, 500);
                        for (let ty = this.y - 2; ty <= this.y + size + 1; ty++) {
                            for (let tx = this.x - 2; tx <= this.x + size + 1; tx++) {
                                if (tx === player.x && ty === player.y) {
                                    let pDef = player.getTotalDef();
                                    let dmg = Math.max(50, 200 - Math.floor(pDef / 2));
                                    player.hp -= dmg;
                                    UI.log(`闇の炎が身体を焼く！ ${dmg} のダメージ！`);
                                }
                            }
                        }
                        return;
                    }
                }

                // --- 真ラスボス: 創造主 AI ---
                if (this.baseType === '創造主') {
                    if (this.activeEffect && Math.random() < 0.5) this.activeEffect = null;
                    const roll = Math.random();
                    if (this.phase === 2 && roll < 0.3) {
                        UI.log("「終焉の光……世界は無へと還る……！」");
                        this.activeEffect = 'apocalypt';
                        setTimeout(() => { if (this.activeEffect === 'apocalypt') this.activeEffect = null; }, 800);
                        const isHit = (Math.abs(dx) === Math.abs(dy) || dx === 0 || dy === 0);
                        if (isHit) {
                            let dmg = Math.max(100, 500 - Math.floor(player.getTotalDef() / 2));
                            player.hp -= dmg;
                            UI.log(`終焉の光に呑み込まれた！ ${dmg} のダメージ！`);
                        }
                        return;
                    }
                    if (dist <= 10 && roll < 0.6) {
                        const isGenesisHit = (Math.abs(dx) <= 1 || Math.abs(dy) <= 1 || Math.abs(Math.abs(dx) - Math.abs(dy)) <= 1);
                        if (isGenesisHit) {
                            UI.log("創造主が「創世の光」を放った！");
                            this.activeEffect = 'genesis';
                            this.fireDir = { x: dx === 0 ? 0 : (dx > 0 ? 1 : -1), y: dy === 0 ? 0 : (dy > 0 ? 1 : -1) };
                            setTimeout(() => { if (this.activeEffect === 'genesis') this.activeEffect = null; }, 500);
                            let dmg = Math.max(80, 300 - Math.floor(player.getTotalDef() / 2));
                            player.hp -= dmg;
                            UI.log(`光の奔流が身体を貫く！ ${dmg} のダメージ！`);
                            return;
                        }
                    }
                    if (roll < 0.8) {
                        if (this.phase === 2 || Math.random() < 0.5) {
                            UI.log("「汝に神の宣告を授けよう……」");
                            this.activeEffect = 'holy_pulse';
                            this.effectX = player.x;
                            this.effectY = player.y;
                            let dmg = Math.max(150, 400 - Math.floor(player.getTotalDef() / 2));
                            player.hp -= dmg;
                            UI.log(`天からの裁きが下る！ ${dmg} のダメージ！`);
                            setTimeout(() => { if (this.activeEffect === 'holy_pulse') this.activeEffect = null; }, 600);
                            return;
                        }
                    }
                    if ((this.hp < this.maxHp * 0.7 || this.phase === 2) && enemies.length < 5 && Math.random() < 0.3) {
                        UI.log("「我が使徒たちよ、不浄なる者を排除せよ」");
                        const types = ['スライム', 'ゴブリン', 'スケルトン', 'オーク'];
                        for (let i = 0; i < 2; i++) {
                            const rx = this.x + (Math.random() < 0.5 ? -2 : 4);
                            const ry = this.y + (Math.random() < 0.5 ? -2 : 4);
                            if (map.isWalkable(rx, ry)) {
                                const newEnemy = new Enemy(rx, ry, types[Math.floor(Math.random() * types.length)], true);
                                enemies.push(newEnemy);
                            }
                        }
                        return;
                    }
                }

                // 1. ドラゴンの遠距離炎攻撃
                if (this.type === 'ドラゴン') {
                    const isLinear = (dx === 0 || dy === 0);
                    if (isLinear && dist > 1 && dist <= 5) {
                        let canSee = true;
                        const stepX = dx === 0 ? 0 : (dx > 0 ? 1 : -1);
                        const stepY = dy === 0 ? 0 : (dy > 0 ? 1 : -1);
                        for (let i = 1; i < dist; i++) {
                            if (map.getTile(this.x + stepX * i, this.y + stepY * i) === TILE.WALL) {
                                canSee = false;
                                break;
                            }
                        }
                        if (canSee) {
                            UI.log(`${this.type}は遠くから炎を吐いた！`);
                            this.isFiring = true;
                            this.fireDir = { x: stepX, y: stepY };
                            this.fireDist = dist;
                            setTimeout(() => { this.isFiring = false; }, 300);

                            if (player.hasAbility('nullify_fire')) {
                                UI.log(`炎を無効化した！`);
                            } else {
                                const fireDmg = 20;
                                player.hp -= fireDmg;
                                UI.log(`もちにゃふぇに ${fireDmg} のダメージ！`);
                            }
                            return;
                        }
                    }
                }
                // 2. 逃走AI（はぐれスライム・メタルキング）
                if (this.baseType === 'はぐれスライム' || this.baseType === 'メタルキング') {
                    // 消失機能は削除済み、距離を取る移動のみ行う
                    const moveDirs = [
                        { x: 1, y: 0 }, { x: -1, y: 0 }, { x: 0, y: 1 }, { x: 0, y: -1 },
                        { x: 1, y: 1 }, { x: 1, y: -1 }, { x: -1, y: 1 }, { x: -1, y: -1 }
                    ];
                    moveDirs.sort((a, b) => {
                        const distA = Math.max(Math.abs(player.x - (this.x + a.x)), Math.abs(player.y - (this.y + a.y)));
                        const distB = Math.max(Math.abs(player.x - (this.x + b.x)), Math.abs(player.y - (this.y + b.y)));
                        return distB - distA; // 遠いほど優先（逃げる）
                    });
                    for (const dir of moveDirs) {
                        const nx = this.x + dir.x;
                        const ny = this.y + dir.y;
                        if (map.isWalkable(nx, ny) && (nx !== player.x || ny !== player.y)) {
                            const occupied = enemies.some(e => e !== this && e.x === nx && e.y === ny && e.hp > 0);
                            if (!occupied) {
                                this.x = nx;
                                this.y = ny;
                                break;
                            }
                        }
                    }
                    return;
                }

                // 3. 巨大ボスAI（アダマンタイト・巨大ハリネズミ）
                if (this.type === 'アダマンタイト' || this.type === '巨大ハリネズミ') {
                    const size = 3;
                    const r = (this.type === 'アダマンタイト') ? 2 : 1;
                    const inRangeToPlayer = (
                        player.x >= this.x - r && player.x <= this.x + size + r - 1 &&
                        player.y >= this.y - r && player.y <= this.y + size + r - 1 &&
                        !(player.x >= this.x && player.x < this.x + size &&
                            player.y >= this.y && player.y < this.y + size)
                    );
                    const adjToPlayer = (
                        player.x >= this.x - 1 && player.x <= this.x + size &&
                        player.y >= this.y - 1 && player.y <= this.y + size &&
                        !(player.x >= this.x && player.x < this.x + size &&
                            player.y >= this.y && player.y < this.y + size)
                    );

                    if (this.type === 'アダマンタイト') {
                        // アダマンタイト専用行動
                        this.isDefending = false; // ターン開始時に解除
                        this.isRoaring = false;
                        this.isTremoring = false;

                        // 1. プレッシャー・ロアー（威圧の咆哮） - 距離5以内で15%
                        if (dist <= 5 && Math.random() < 0.15) {
                            UI.log("アダマンタイトの凄まじい咆哮！");
                            UI.log("もちにゃふぇは威圧されて動けない！");
                            player.isStunned = 1;
                            this.isRoaring = true;
                            setTimeout(() => { this.isRoaring = false; }, 500);
                            return;
                        }

                        // 2. アダマン・シェル（鉄壁の防御） - 射程内に20%
                        if (inRangeToPlayer && Math.random() < 0.20) {
                            UI.log("アダマンタイトは殻に閉じこもった！ 防御力が大幅に上がった！");
                            this.isDefending = true;
                            return;
                        }

                        // 3. グランド・トレマー（大地の踏みつけ） - 射程内に15%
                        if (inRangeToPlayer && Math.random() < 0.15) {
                            UI.log("アダマンタイトの地響き！ 周囲に衝撃が走る！");
                            this.isTremoring = true;
                            setTimeout(() => { this.isTremoring = false; }, 500);

                            // 周囲 7x7 (ボスの周囲2マス) にダメージとノックバック
                            for (let ty = this.y - 2; ty <= this.y + size + 1; ty++) {
                                for (let tx = this.x - 2; tx <= this.x + size + 1; tx++) {
                                    if (tx === player.x && ty === player.y) {
                                        let pDef = player.getTotalDef();
                                        let tremorDmg = Math.max(5, 40 - Math.floor(pDef / 2));
                                        player.hp -= tremorDmg;
                                        UI.log(`もちにゃふぇに ${tremorDmg} のダメージ！`);

                                        // ノックバック (ボスから離れる方向)
                                        const nbX = player.x + (player.x > this.x + 1 ? 1 : (player.x < this.x + 1 ? -1 : 0));
                                        const nbY = player.y + (player.y > this.y + 1 ? 1 : (player.y < this.y + 1 ? -1 : 0));
                                        if (map.isWalkable(nbX, nbY)) {
                                            player.x = nbX;
                                            player.y = nbY;
                                            UI.log("衝撃で弾き飛ばされた！");
                                        }
                                    }
                                }
                            }
                            return;
                        }
                    }

                    if (this.type === '巨大ハリネズミ') {
                        this.isPrickly = false;
                        if (this.hp < this.maxHp * 0.5 && Math.random() < 0.15) {
                            UI.log(`巨大ハリネズミが全身のトゲを逆立てた！`);
                            this.isPrickly = true;
                            setTimeout(() => { this.isPrickly = false; }, 1000);
                            if (adjToPlayer) {
                                let pDef = player.getTotalDef();
                                let thornDmg = Math.max(5, 25 - Math.floor(pDef / 3));
                                player.hp -= thornDmg;
                                UI.log(`トゲが刺さり、もちにゃふぇに ${thornDmg} のダメージ！`);
                            }
                            // 周囲にもダメージ（アダマンタイトのトレマーに近いがノックバックなし）
                            for (let ty = this.y - 1; ty <= this.y + size; ty++) {
                                for (let tx = this.x - 1; tx <= this.x + size; tx++) {
                                    if (tx === player.x && ty === player.y && !adjToPlayer) {
                                        let pDef = player.getTotalDef();
                                        let thornDmg = Math.max(2, 12 - Math.floor(pDef / 4));
                                        player.hp -= thornDmg;
                                        UI.log(`飛んできたトゲで ${thornDmg} のダメージ！`);
                                    }
                                }
                            }
                            // 2回行動処理へ（下部の共通処理で判定）
                        }
                    }

                    const canAttack = (this.type === 'アダマンタイト') ? inRangeToPlayer : adjToPlayer;
                    if (canAttack) {
                        let pDef = player.def + (player.equipDef ? player.equipDef.value : 0);
                        let damage = Math.max(1, this.str - Math.floor(pDef / 2));
                        if (player.hasAbility('damage_reduce')) damage = Math.floor(damage * 0.7);
                        player.hp -= damage;
                        UI.log(`${this.type}の攻撃！ もちにゃふぇに ${damage} のダメージ！`);
                        if (player.hasAbility('reflect')) {
                            let refDmg = Math.floor(damage * 0.3);
                            if (refDmg > 0) { this.hp -= refDmg; UI.log(`${this.type}に ${refDmg} の反射ダメージ！`); }
                        }
                    } else if (dist <= 10) {
                        const mx = (dx === 0) ? 0 : (dx > 0 ? 1 : -1);
                        const my = (dy === 0) ? 0 : (dy > 0 ? 1 : -1);
                        const nx = this.x + mx;
                        const ny = this.y + my;
                        let canMove = true;
                        for (let yy = 0; yy < size; yy++) {
                            for (let xx = 0; xx < size; xx++) {
                                // 画面端チェック
                                if (nx + xx < 0 || nx + xx >= map.width || ny + yy < 0 || ny + yy >= map.height) {
                                    canMove = false;
                                    break;
                                }
                                if (!map.isWalkable(nx + xx, ny + yy)) canMove = false;
                                if (nx + xx === player.x && ny + yy === player.y) canMove = false;
                                if (!canMove) break;
                            }
                            if (!canMove) break;
                        }
                        if (canMove) { this.x = nx; this.y = ny; }
                    }

                    // 発狂モード判定（HP50%以下なら2回行動フラグを立てる）
                    if ((this.type === 'アダマンタイト' || this.type === '巨大ハリネズミ') && this.hp < this.maxHp * 0.5 && !this._rageActed) {
                        this._rageActed = true;
                        // 1回目の行動後に自分自身をもう一度呼び出す
                        setTimeout(() => {
                            if (this.hp > 0) this.act(player, map, enemies, gameManager);
                        }, 100);
                    } else {
                        this._rageActed = false; // 2回目の行動後、または通常時はリセット
                    }
                    return;
                }

                // 4. 壁貫通AI（亡霊騎士など）
                if (this.canPhaseWall) {
                    if (dist === 1) {
                        let pDef = player.def + (player.equipDef ? player.equipDef.value : 0);
                        let damage = Math.max(1, this.str - Math.floor(pDef / 2));
                        if (player.hasAbility('damage_reduce')) damage = Math.floor(damage * 0.7);
                        player.hp -= damage;
                        UI.log(`${this.type}が陰から襲った！ もちにゃふぇに ${damage} のダメージ！`);
                    } else if (dist <= 8) {
                        const mx = dx === 0 ? 0 : (dx > 0 ? 1 : -1);
                        const my = dy === 0 ? 0 : (dy > 0 ? 1 : -1);
                        const nx = this.x + mx;
                        const ny = this.y + my;
                        const occupied = enemies.some(e => e !== this && e.x === nx && e.y === ny && e.hp > 0);
                        if (!occupied && (nx !== player.x || ny !== player.y)) {
                            this.x = nx;
                            this.y = ny;
                        }
                    }
                    return;
                }

                // 5. 通常敵AI
                if (dist === 1) {
                    let pDef = player.def + (player.equipDef ? player.equipDef.value : 0);
                    if (player.awakenTurns > 0) pDef *= 2;
                    let damage = Math.max(1, this.str - Math.floor(pDef / 2));
                    if (player.hasAbility('damage_reduce')) damage = Math.floor(damage * 0.7);
                    player.hp -= damage;
                    UI.log(`${this.type}の攻撃！ もちにゃふぇに ${damage} のダメージ！`);
                    if (player.awakenTurns === 0) {
                        player.awakenGauge = Math.min(player.awakenMax, player.awakenGauge + 10);
                        if (gameManager) gameManager.updateAwakenButton();
                    }
                    if (player.hasAbility('reflect')) {
                        let refDmg = Math.floor(damage * 0.3);
                        if (refDmg > 0) { this.hp -= refDmg; UI.log(`${this.type}に ${refDmg} の反射ダメージ！`); }
                    }
                } else if (dist <= 5) {
                    const mx = dx === 0 ? 0 : (dx > 0 ? 1 : -1);
                    const my = dy === 0 ? 0 : (dy > 0 ? 1 : -1);
                    const nx = this.x + mx;
                    const ny = this.y + my;
                    if (map.isWalkable(nx, ny) && (nx !== player.x || ny !== player.y)) {
                        const occupied = enemies.some(e => e !== this && e.x === nx && e.y === ny && e.hp > 0);
                        if (!occupied) { this.x = nx; this.y = ny; }
                    }
                }
            }
        }

        // アイテムクラス
        class Item extends Entity {
            constructor(x, y, type, name, value, ability = null) {
                super(x, y);
                this.type = type; // 'food', 'disk_atk', 'disk_def', 'disk_abi'
                this.name = name;
                this.value = value;
                this.isEquipped = false;
                this.plus = 0;
                this.abilities = ability ? [ability] : [];
            }

            get displayName() {
                if (this.type.startsWith('disk_')) {
                    const eqMark = this.isEquipped ? "[E] " : "";
                    const plusStr = this.plus > 0 ? `+${this.plus}` : (this.plus < 0 ? this.plus.toString() : "");
                    return `${eqMark}${this.name}${plusStr}`;
                } else {
                    return this.name;
                }
            }


        }

        class PixelArtEngine {
            static textures = {};
            static mochinyafeImg = null;

            static loadTextures(targetSize) {
                for (let key in SPRITES) {
                    this.textures[key] = this.createTexture(SPRITES[key], targetSize);
                }
                return new Promise((resolve) => {
                    this.mochinyafeImg = new Image();
                    this.mochinyafeImg.onload = () => resolve();
                    this.mochinyafeImg.onerror = () => resolve();
                    this.mochinyafeImg.src = 'motimoti.png';
                });
            }
            static createTexture(data, size) {
                const h = data.length;
                const w = data[0].length;
                const pixelW = size / w;
                const pixelH = size / h;

                const c = document.createElement('canvas');
                c.width = size;
                c.height = size;
                const ctx = c.getContext('2d');

                for (let y = 0; y < h; y++) {
                    for (let x = 0; x < w; x++) {
                        const char = data[y][x];
                        const color = PALETTE[char];
                        if (color) {
                            ctx.fillStyle = color;
                            ctx.fillRect(Math.floor(x * pixelW), Math.floor(y * pixelH), Math.ceil(pixelW), Math.ceil(pixelH));
                        }
                    }
                }
                return c;
            }

            // 外部画像テクスチャのロード用静的メンバ
            static externalTextures = {};
            static loadExternalTextures() {

                    'bg_11_20': 'Assets/11-20.jpg',
                    'bg_21_40': 'Assets/21-40.jpg',

                    // クリア・エンディング画面（プリロード）
                    'img_clear': 'Assets/clear.jpg',
                    'img_trueend': 'Assets/trueend.jpg'
                };
                for (let key in assets) {
                    const img = new Image();
                    img.src = assets[key];
                    PixelArtEngine.externalTextures[key] = img;
                }
            }
        }

                    const possibleItems = [

                    if (this.floor >= 41) {
                        // 41階以上は 7:3 の比率を厳守するため、一旦 possibleItems から通常のティー（索引2）を除去し、再抽選
                        possibleItems.splice(2, 1);

                    // 階層に基づいた出現敵テーブル
                    const spawnTable = [

                    for (let t of spawnTable) {

                    for (let i = 1; i < this.map.rooms.length; i++) {

                                if (Math.random() < 0.05) {

            // ターン処理の進行
            processTurn() {
                let hungerDec = 0.1;
                if (this.player.hasAbility('slow_hunger')) hungerDec = 0.05;

                // 満腹度制御
                if (this.player.hasAbility('creator')) {
                    hungerDec = 0; // 減らない
                } else if (this.player.hasAbility('ultimate')) {
                    this.player.food = 0; // 常に0
                    hungerDec = 0;
                } else if (this.player.fullnessDuration > 0) {
                    hungerDec = 0;
                    this.player.fullnessDuration--;
                }
                this.player.food = Math.max(0, this.player.food - hungerDec);

                // 餓死判定（満腹度が0ならHP減少、ただし creator 加護中は免除）
                if (this.player.food <= 0 && !this.player.hasAbility('creator')) {
                    this.player.hp--;
                } else if (this.player.hp < this.player.maxHp) {
                    if (Math.random() < 0.1) this.player.hp++;
                }

                for (let i = this.enemies.length - 1; i >= 0; i--) {
                    const enemy = this.enemies[i];
                    if (enemy.hp <= 0) {
                        this.enemies.splice(i, 1);
                    } else {
                        enemy.act(this.player, this.map, this.enemies, this);
                        // はぐれスライム・メタルキングは2倍速（2回行動）
                        if ((enemy.baseType === 'はぐれスライム' || enemy.baseType === 'メタルキング') && enemy.hp > 0) {
                            enemy.act(this.player, this.map, this.enemies, this);
                        }
                        // ダークもちにゃふぇは3倍速（3回行動）
                        if (enemy.type === 'ダークもちにゃふぇ' && enemy.hp > 0) {
                            enemy.act(this.player, this.map, this.enemies, this);
                            if (enemy.hp > 0) enemy.act(this.player, this.map, this.enemies, this);
                        }
                    }
                }

                // 覚醒ターンのカウントダウンは各行動の完了時（2回行動の最後）に一元化
                // プレイヤーの行動不能フラグは通常ターン経過で消費
                if (this.player.isStunned > 0) {
                    this.player.isStunned--;
                }

                if (this.player.hp <= 0) {
                    UI.log("再起不能(リタイア)した……");
                    this.gameOver();
                }

                UI.updateStatus(this.player, this.floor);
                // processTurnの最後にオートセーブ（覚醒ターン等の変化を記録）
                this.saveGame();
            }

            // プレイヤーの一回分の行動終了（覚醒時の2回行動管理を含む）
            endPlayerTurn() {
                if (this.player.hp <= 0) return;

                // スタン中なら強制的に敵のターンへ
                if (this.player.isStunned > 0) {
                    this.processTurn();
                    this.draw();
                    return;
                }

                // 覚醒中の2回行動対応
                if (this.player.awakenTurns > 0 && !this.player._awakenActed) {
                    this.player._awakenActed = true;
                    this.draw();
                    return;
                }

                // 2回行動終了、または通常時にターン消費
                this.player._awakenActed = false;
                if (this.player.awakenTurns > 0) {
                    this.player.awakenTurns--;
                    if (this.player.awakenTurns === 0) UI.log('覚醒が解けた……');
                }

                this.processTurn();
                this.updateAwakenButton();
                this.draw();
            }

            // プレイヤー行動実行
            actionMove(dx, dy) {
                if (this.player.hp <= 0 || this.isConversationActive()) return;

                // 方向転換モードの場合
                if (this.isDirectionMode) {
                    if (dx > 0 && dy > 0) this.player.direction = 'down-right';
                    else if (dx > 0 && dy < 0) this.player.direction = 'up-right';
                    else if (dx < 0 && dy > 0) this.player.direction = 'down-left';
                    else if (dx < 0 && dy < 0) this.player.direction = 'up-left';
                    else if (dx > 0) this.player.direction = 'right';
                    else if (dx < 0) this.player.direction = 'left';
                    else if (dy > 0) this.player.direction = 'down';
                    else if (dy < 0) this.player.direction = 'up';

                    this.isDirectionMode = false; // モード解除
                    const btn = document.getElementById('btn-dir-pad-center');
                    if (btn) {
                        btn.style.background = '';
                        btn.style.color = '';
                    }
                    this.draw();
                    return;
                }

                const nx = this.player.x + dx;
                const ny = this.player.y + dy;

                // 向きを更新
                if (dx > 0 && dy > 0) this.player.direction = 'down-right';
                else if (dx > 0 && dy < 0) this.player.direction = 'up-right';
                else if (dx < 0 && dy > 0) this.player.direction = 'down-left';
                else if (dx < 0 && dy < 0) this.player.direction = 'up-left';
                else if (dx > 0) this.player.direction = 'right';
                else if (dx < 0) this.player.direction = 'left';
                else if (dy > 0) this.player.direction = 'down';
                else if (dy < 0) this.player.direction = 'up';

                // 攻撃対象の探索（1マス目のみ）
                let targets = [];
                // 通常攻撃または壁貫通攻撃(phase_wall)
                const target1 = this.enemies.find(e => e.x === nx && e.y === ny && e.hp > 0);
                if (target1) targets.push(target1);

                // 3x3ボスへの当たり判定
                if (!target1) {
                    const bossTarget = this.enemies.find(e =>
                        e.hp > 0 && ENEMY_DEFS[e.type] && ENEMY_DEFS[e.type].size &&
                        nx >= e.x && nx < e.x + ENEMY_DEFS[e.type].size &&
                        ny >= e.y && ny < e.y + ENEMY_DEFS[e.type].size
                    );
                    if (bossTarget) targets.push(bossTarget);
                }

                if (targets.length > 0) {
                    SoundManager.playAttack();
                    // 攻撃アニメーションフラグを立てる（通常の物理攻撃のみ）
                    this.player.isAttacking = true;
                    setTimeout(() => {
                        this.player.isAttacking = false;
                        this.draw();
                    }, 150);

                    // 攻撃処理の内部関数化
                    const doAttack = (enemy, isSecondary = false) => {
                        if (enemy.hp <= 0) return;
                        let totalStr = this.player.getTotalAtk();

                        // 覚醒中はさらに攻撃力2倍
                        if (this.player.awakenTurns > 0) totalStr *= 2;

                        // 特殊能力：攻撃力+5
                        if (this.player.hasAbility('atk_plus_5')) totalStr += 5;

                        let targetDef = enemy.def;
                        // アダマン・シェル発動中は防御力3倍
                        if (enemy.type === 'アダマンタイト' && enemy.isDefending) {
                            targetDef *= 3;
                        }
                        let damage = Math.max(1, totalStr - Math.floor(targetDef / 2));

                        // はぐれスライムはダメージ1固定
                        if (enemy.type === 'はぐれスライム') damage = 1;

                        enemy.hp -= damage;
                        const msgPrefix = isSecondary ? "炎が突き抜ける！ " : "";
                        UI.log(`${msgPrefix}もちにゃふぇの攻撃！ ${enemy.type}に ${damage} のダメージ！`);

                        // ボスのトゲ反撃：攻撃するたびに30%の確率で発動
                        if (enemy.type === '巨大ハリネズミ' && enemy.hp > 0 && Math.random() < 0.30) {
                            UI.log(`巨大ハリネズミはトゲで反撃した！`);
                            const thornDmg = 10;
                            this.player.hp -= thornDmg;
                            UI.log(`もちにゃふぇに ${thornDmg} のダメージ！`);
                        }

                        // 撃破判定は checkEnemyDeath に集約
                        this.checkEnemyDeath(enemy);
                    };

                    // 全対象に攻撃（1マス目、2マス目）
                    targets.forEach((t, i) => {
                        doAttack(t, i > 0);
                    });

                    // 連続攻撃判定（1マス目の敵がまだ生きている場合、または2マス目の敵のみの場合も考慮するが、基本はメインターゲットベース）
                    if (targets[0] && targets[0].hp > 0 && this.player.hasAbility('multi_attack') && Math.random() < 0.25) {
                        UI.log(`もちにゃふぇのすさまじい連撃！`);
                        targets.forEach((t, i) => {
                            if (t.hp > 0) doAttack(t, i > 0);
                        });
                    }

                    this.processTurn();
                    this.draw();
                    return;
                }

                // 壁に向かって行動したとき
                const nextTile = this.map.getTile(nx, ny);
                if (!this.map.isWalkable(nx, ny)) {
                    // phase_wall能力があれば「通常の壁」の中へ移動可能
                    // ただし最外周の壁(OUT_BOUNDARY)は絶対に通れない
                    if (this.player.hasAbility('phase_wall') && nextTile !== TILE.OUT_BOUNDARY) {
                        // 壁の中への移動を許可するため、ここではリターンせず通常移動処理へ流す
                    } else if (this.player.hasAbility('wall_attack')) {
                        // ダイバー・ダウン装備時：壁沿いの敵にダメージ
                        this.player.isAttacking = true;
                        setTimeout(() => { this.player.isAttacking = false; this.draw(); }, 200);

                        // 壁タイル(nx,ny)に隣接するフロアタイル上の敵を収集
                        let wallAttackTargets = [];
                        const scanDirs = dx !== 0
                            ? [{ sx: 0, sy: -1 }, { sx: 0, sy: 1 }]
                            : [{ sx: -1, sy: 0 }, { sx: 1, sy: 0 }];

                        for (const sd of scanDirs) {
                            for (let step = -4; step <= 4; step++) {
                                let scanX = this.player.x + sd.sx * Math.abs(step) * (step < 0 ? -1 : 1);
                                let scanY = this.player.y + sd.sy * Math.abs(step) * (step < 0 ? -1 : 1);
                                const adjX = scanX + dx;
                                const adjY = scanY + dy;
                                if (this.map.getTile(adjX, adjY) === TILE.WALL) {
                                    const e = this.enemies.find(en => en.x === scanX && en.y === scanY && en.hp > 0);
                                    if (e && !wallAttackTargets.includes(e)) wallAttackTargets.push(e);
                                }
                            }
                        }

                        if (wallAttackTargets.length > 0) {
                            UI.log(`壁沿いの魔撃！ 壁に面した敵をまとめて攻撃！`);
                            let totalStr = this.player.str;
                            if (this.player.equipAtk) totalStr += this.player.equipAtk.value;
                            if (this.player.hasAbility('atk_plus_5')) totalStr += 5;
                            // 覚醒中は攻撃力2倍
                            if (this.player.awakenTurns > 0) totalStr *= 2;
                            wallAttackTargets.forEach(e => {
                                const damage = Math.max(1, totalStr - Math.floor(e.def / 2));
                                e.hp -= damage;
                                UI.log(`${e.type} に ${damage} ダメージ！`);
                                this.checkEnemyDeath(e);
                            });
                        } else {
                            UI.log(`壁沿いの魔撃！が、壁沿いに敵はいない。`);
                        }

                        this.endPlayerTurn();
                        return;
                    } else {
                        // 壁の場合は移動しない
                        return;
                    }
                }

                // 通常移動
                this.player.x = nx;
                this.player.y = ny;
                this.player.walkFrame = (this.player.walkFrame + 1) % 2; // 歩行アニメーション切り替え

                // 足元のアイテムを自動取得
                const itemIdx = this.items.findIndex(i => i.x === this.player.x && i.y === this.player.y);
                if (itemIdx >= 0) {
                    const item = this.items[itemIdx];
                    if (this.player.inv.length < 30) {
                        this.player.inv.push(item);
                        this.items.splice(itemIdx, 1);
                        if (this.isAtBase) this.baseItems = [...this.items];
                        UI.log(`${item.name} を取得した。`);
                    } else {
                        UI.log(`足元に ${item.name} があるが、持ちきれない。`);
                    }
                }

                const tile = this.map.getTile(nx, ny);
                if (tile === TILE.STAIRS || tile === TILE.BASE_EXIT) {
                    this.actionInteract();
                    return;
                }

                this.endPlayerTurn();
            }

            // 足元/概階アクション
            actionInteract() {
                if (this.isConversationActive()) return;
                const idx = this.items.findIndex(i => i.x === this.player.x && i.y === this.player.y);
                if (idx >= 0) {
                    if (this.player.inv.length >= 30) {
                        UI.log("持ちものがいっぱいで拾えない！");
                        return;
                    }
                    const item = this.items[idx];
                    this.player.inv.push(item);
                    this.items.splice(idx, 1);
                    if (this.isAtBase) this.baseItems = [...this.items];
                    UI.log(`${item.name} を拾った。`);
                    SoundManager.playItemGet(); // アイテムピックアップ音
                    this.endPlayerTurn();
                } else {
                    const tile = this.map.getTile(this.player.x, this.player.y);
                    if (tile === TILE.STAIRS) {
                        SoundManager.playStairs(); // 階段音
                        this.floor++;
                        this.initFloor();
                        this.updateAwakenButton();
                        this.saveGame(); // フロア移動は特殊なのでここで即時保存
                        this.draw();
                    } else if (tile === TILE.BASE_EXIT) {
                        SoundManager.playStairs(); // 階段音(拠点脱出)
                        this.isAtBase = false;
                        this.floor = 1;
                        this.initFloor();
                        this.updateAwakenButton();
                        this.saveGame(); // フロア移動は特殊なのでここで即時保存
                        this.draw();
                    } else if (tile === TILE.STORAGE) {
                        this.openStorageMenu();
                        this.draw();
                    } else {
                        UI.log("足元には何もない。");
                    }
                }
            }

            // 覚醒ボタンのCSSClassUpdate
            updateAwakenButton() {
                const btn = document.getElementById('btn-action');
                if (!btn) return;
                btn.classList.remove('awakened', 'awaken-active');
                if (this.player.awakenTurns > 0) {
                    // 覚醒中：熱いオレンジグラデーション
                    btn.classList.add('awaken-active');
                    btn.textContent = `覚醒(${this.player.awakenTurns})`;
                } else if (this.player.awakenGauge >= this.player.awakenMax) {
                    // 満タン：虹色に輪く
                    btn.classList.add('awakened');
                    btn.textContent = '覚醒★満タン';
                } else {
                    // 山販中：通常表示
                    const pct = Math.floor((this.player.awakenGauge / this.player.awakenMax) * 100);
                    btn.textContent = `覚醒 ${pct}%`;
                }
            }

            // 倉庫メニュー
            openStorageMenu() {
                this.storageState = 'withdraw';
                this.refreshStorageUI();
                document.getElementById('menu-modal').classList.add('active');
            }

            refreshStorageUI() {
                const listDiv = document.getElementById('menu-list');
                listDiv.innerHTML = '';

                const tabDiv = document.createElement('div');
                tabDiv.style.display = 'flex';
                tabDiv.style.marginBottom = '10px';

                const btnWithdraw = document.createElement('button');
                btnWithdraw.innerText = `引き出す (${this.storage.length})`;
                btnWithdraw.style.cssText = `flex:1; padding:8px; border:none; cursor:pointer; background:${this.storageState === 'withdraw' ? '#d32f2f' : '#444'}; color:white;`;
                btnWithdraw.onclick = () => { this.storageState = 'withdraw'; this.refreshStorageUI(); };

                const btnDeposit = document.createElement('button');
                btnDeposit.innerText = `預ける (${this.player.inv.length}/30)`;
                btnDeposit.style.cssText = `flex:1; padding:8px; border:none; cursor:pointer; background:${this.storageState === 'deposit' ? '#d32f2f' : '#444'}; color:white;`;
                btnDeposit.onclick = () => { this.storageState = 'deposit'; this.refreshStorageUI(); };

                tabDiv.appendChild(btnWithdraw);
                tabDiv.appendChild(btnDeposit);
                listDiv.appendChild(tabDiv);

                const currentList = this.storageState === 'withdraw' ? this.storage : this.player.inv;

                if (currentList.length === 0) {
                    const msg = document.createElement('div');
                    msg.innerText = "アイテムがありません。";
                    msg.style.padding = "20px";
                    listDiv.appendChild(msg);
                } else {
                    currentList.forEach((item, index) => {
                        const div = document.createElement('div');
                        div.style.padding = "10px";
                        div.style.borderBottom = "1px solid #444";
                        div.style.display = "flex";
                        div.style.justifyContent = "space-between";
                        div.style.alignItems = "center";

                        const label = document.createElement('span');
                        label.innerText = item.displayName;
                        div.appendChild(label);

                        const btn = document.createElement('button');
                        btn.style.padding = "5px 10px";
                        btn.innerText = this.storageState === 'withdraw' ? "出す" : "預ける";
                        btn.onclick = () => this.executeStorageAction(index);
                        div.appendChild(btn);
                        listDiv.appendChild(div);
                    });
                }
            }

            executeStorageAction(index) {
                if (this.storageState === 'withdraw') {
                    if (this.player.inv.length >= 30) {
                        UI.log("手荷物がいっぱいです。");
                        return;
                    }
                    const item = this.storage.splice(index, 1)[0];
                    this.player.inv.push(item);
                } else {
                    const item = this.player.inv[index];
                    if (item.isEquipped) {
                        UI.log("装備中のものは預けられません。");
                        return;
                    }
                    this.player.inv.splice(index, 1);
                    this.storage.push(item);
                }
                this.refreshStorageUI();
            }

            // インベントリの並べ替えメソッド
            // 順序: 装備（攻撃の心→防御の心）→パンケーキ系→ラベンダーティー系→巻物系
            sortInventory() {
                // 分類ごとの優先度を返す関数
                const getSortPriority = (item) => {
                    if (item.type === 'disk_atk') return 0; // 攻撃の心
                    if (item.type === 'disk_def') return 1; // 防御の心
                    if (item.type === 'disk_acc') return 2; // アクセサリー
                    if (item.type === 'food') return 3;     // パンケーキ系
                    if (item.type === 'potion') return 4;   // ラベンダーティー系
                    // 巻物系（合成・脱出）
                    if (item.type === 'comic_synth' || item.type === 'disk_exit') return 5;
